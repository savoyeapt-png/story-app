<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Story Patcher · Mobile v0.4.2</title>
<style>
:root{
  --bg:#faf8f5; --paper:#fffdfb; --ink:#2b2620; --sub:#7d7568; --line:#e7e1d6;
  --modified:#ffe49a; --modified-line:#e0b94a;
  --added:#d8f0d3; --added-line:#7fbf6f;
  --suggested:#eadfff; --suggested-line:#b48af0;
  --deleted:#d84a4a;
  --memo:#dbe5ec; --memo-line:#91a6b5;
  --accent:#b5482e; --accent-ink:#fff;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
  --app-height: 100dvh;
  --app-top: 0px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;margin:0;overscroll-behavior:none;overflow:hidden}
body{
  font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink); display:flex; justify-content:center;
  min-height:100%; touch-action:manipulation;
}
#device{
  width:100%; max-width:480px; height:var(--app-height,100dvh); min-height:0; max-height:var(--app-height,100dvh); background:var(--bg);
  display:flex; flex-direction:column; position:fixed; left:50%; top:var(--app-top,0px); transform:translateX(-50%); overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,.22);
}
/* ---------- appbar ---------- */
.appbar{
  display:flex; align-items:center; gap:10px; padding:calc(10px + var(--safe-t)) 12px 10px;
  border-bottom:1px solid var(--line); background:var(--paper); flex:0 0 auto; z-index:20;
}
.iconbtn{width:38px;height:38px;border:none;background:transparent;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--ink);cursor:pointer;flex:0 0 auto}
.iconbtn:active{background:var(--line)}
.title{flex:1;min-width:0;font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.title small{display:block;font-size:11px;font-weight:500;color:var(--sub)}

/* ---------- editor ---------- */
.stage{flex:1 1 auto;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.paper-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;padding:22px 20px 150px;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;touch-action:pan-y;scroll-padding-top:24px;scroll-padding-bottom:170px}
#editor{font-size:17px;line-height:1.9;outline:none;min-height:100%;white-space:pre-wrap;word-break:keep-all;user-select:text;-webkit-user-select:text;-webkit-touch-callout:default;touch-action:auto}
#editor:empty:before{content:"문서함에서 회차를 열거나 새로 추가해 주세요.";color:#b3aa9c}
#editor:focus{caret-color:var(--accent)}
.modified{background:var(--modified);border-radius:2px;padding:0 1px}
.added{background:var(--added);border-radius:2px;padding:0 1px}
.suggestion{background:var(--suggested);border-radius:2px;padding:0 1px}
.deleted{color:#b23b3b;text-decoration:line-through;text-decoration-color:var(--deleted);opacity:.72}
.memo{display:inline-block;background:var(--memo);color:#3d5160;border:1px dashed var(--memo-line);
  border-radius:5px;padding:1px 6px;font-size:.85em}
.memo::before{content:"메모";font-size:9px;font-weight:800;color:#5c7180;margin-right:4px}
.pending-edit{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.modified.pending-edit,.added.pending-edit{display:block;width:100%;min-width:0;margin:.35em 0;padding:7px 9px;vertical-align:baseline}
.pending-target{outline:1px solid currentColor;outline-offset:1px}
.inline-textarea{
  display:block;width:100%;min-width:0;max-width:100%;margin:0;border:0;outline:0;resize:none;
  overflow-y:hidden;background:transparent;color:inherit;padding:0;border-radius:0;
  font:inherit;font-size:inherit;line-height:1.75;letter-spacing:inherit;text-align:inherit;
  white-space:pre-wrap;word-break:keep-all;overflow-wrap:anywhere;caret-color:var(--accent);
  -webkit-appearance:none;appearance:none;-webkit-text-size-adjust:100%;touch-action:manipulation;
}
.inline-textarea::placeholder{color:#a89d90;opacity:.9}
.inline-edit-buffer{min-height:2.15em}
.inline-note-editor{display:block;min-height:78px;margin:10px 0;padding:10px 12px;border-radius:9px;line-height:1.65}
.inline-note-editor.suggest-note{background:var(--suggested);border:1px solid var(--suggested-line)}
.inline-note-editor.memo-note{background:var(--memo);border:1px solid var(--memo-line);color:#334956}
.inline-textarea[readonly]{cursor:default;opacity:.92}
.edit-marker{display:inline-block!important;width:0!important;height:0!important;overflow:hidden!important;font-size:0!important;line-height:0!important;vertical-align:baseline!important}

/* ---------- bottom status ---------- */
.statusbar{
  flex:0 0 auto; display:flex; justify-content:space-between; align-items:center;
  padding:8px 16px calc(8px + var(--safe-b)); font-size:11.5px; color:var(--sub);
  border-top:1px solid var(--line); background:var(--paper); z-index:20;
}
.statusbar .saved{font-weight:700}
.statusbar .saved.clean{color:#4c8c5b}
.statusbar .saved.dirty{color:#b5482e}
.statusbar .saved.neutral{color:var(--sub)}
#device.keyboard-open .paper-scroll{padding-bottom:118px;scroll-padding-bottom:132px}
#device.keyboard-open .statusbar{padding-top:5px;padding-bottom:calc(5px + var(--safe-b))}

/* ---------- PATCH floating button + radial ---------- */
.patch-fab{
  position:absolute; left:0; top:0; width:56px; height:56px;
  border-radius:50%; border:none; background:var(--accent); color:var(--accent-ink);
  font-size:13px; font-weight:800; letter-spacing:.02em; box-shadow:0 6px 16px rgba(181,72,46,.4);
  z-index:30; display:flex; align-items:center;justify-content:center; cursor:pointer;
  transform:translate(-50%,-50%); transition:left .2s ease,top .2s ease,transform .15s ease,opacity .15s ease;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
.patch-fab.disabled{background:#c7bfae;box-shadow:none}
.patch-fab.open{transform:translate(-50%,-50%) scale(.94)}
.patch-fab.dragging{transform:translate(-50%,-50%) scale(1.08);box-shadow:0 10px 24px rgba(181,72,46,.46);transition:none}
.patch-fab.auto-avoiding{transition:left .16s ease,top .16s ease,transform .15s ease}
.radial-menu{position:absolute;inset:0;z-index:29;pointer-events:none}
.radial-menu.show{pointer-events:auto}
.radial-item{
  position:absolute;left:0;top:0;
  display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);
  border-radius:22px;padding:9px 16px 9px 12px;font-size:14px;font-weight:600;color:var(--ink);
  box-shadow:0 4px 10px rgba(0,0,0,.12);cursor:pointer;white-space:nowrap;
  opacity:0;transform:translate(-50%,-50%) scale(.72);
  transition:transform .2s cubic-bezier(.2,.9,.25,1.18),opacity .15s ease;
}
.radial-menu.show .radial-item{opacity:1;transform:translate(calc(-50% + var(--rx)),calc(-50% + var(--ry))) scale(1)}
.radial-item .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.radial-item[data-act="modify"] .dot{background:var(--modified-line)}
.radial-item[data-act="add"] .dot{background:var(--added-line)}
.radial-item[data-act="delete"] .dot{background:var(--deleted)}
.radial-item[data-act="suggest"] .dot{background:var(--suggested-line)}
.radial-item[data-act="memo"] .dot{background:var(--memo-line)}
.radial-scrim{position:absolute;inset:0;z-index:25;background:transparent;display:none;pointer-events:none}
.radial-scrim.show{display:block}
.sel-count{display:none!important}

/* ---------- inline action bar (above keyboard) ---------- */
.actionbar{
  position:absolute; left:0; right:0; bottom:0; z-index:40; background:var(--paper);
  border-top:1px solid var(--line); padding:8px 12px calc(8px + var(--safe-b));
  display:flex; align-items:center; gap:8px; transform:translateY(100%); transition:transform .18s ease;
}
.actionbar.show{transform:translateY(0)}
.actionbar .kind{font-size:12px;font-weight:700;color:var(--sub);flex:0 0 auto;padding-right:2px}
.actionbar .spacer{flex:1}
.actionbar button{
  border:none;background:#efe9de;color:var(--ink);border-radius:16px;padding:8px 14px;
  font-size:13.5px;font-weight:700;cursor:pointer;
}
.actionbar button.primary{background:var(--accent);color:#fff}
.actionbar button.ghost{background:transparent;color:var(--sub)}

/* ---------- snackbar ---------- */
.snackbar{
  position:absolute; left:14px; right:14px; bottom:14px; z-index:210;
  max-width:430px; margin:0 auto;
  background:rgba(43,38,32,.78); color:#fffaf2;
  border:1px solid rgba(255,255,255,.15); border-radius:12px; padding:11px 14px; font-size:13px;
  display:flex; justify-content:space-between; align-items:center; gap:12px;
  box-shadow:0 8px 24px rgba(24,20,16,.18);
  -webkit-backdrop-filter:blur(14px) saturate(1.15); backdrop-filter:blur(14px) saturate(1.15);
  transform:translateY(16px); opacity:0; pointer-events:none; transition:transform .2s ease,opacity .2s ease,bottom .18s ease;
}
.snackbar.show{transform:translateY(0);opacity:1;pointer-events:auto}
.snackbar button{background:transparent;border:none;color:#ffd1c2;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}
#device.inline-active .snackbar{bottom:72px}
#device.preview-mode .snackbar{bottom:calc(78px + var(--safe-b));visibility:visible!important;pointer-events:auto!important}

/* ---------- bottom drawer (management) ---------- */
.scrim{position:absolute;inset:0;background:rgba(20,17,12,.42);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{
  position:absolute; left:0; right:0; bottom:0; z-index:51; background:var(--paper);
  border-radius:18px 18px 0 0; box-shadow:0 -8px 24px rgba(0,0,0,.18);
  max-height:55vh; display:flex; flex-direction:column; transform:translateY(105%); visibility:hidden; pointer-events:none;
  transition:transform .22s ease,visibility 0s linear .22s;
}
.drawer.show{transform:translateY(0);visibility:visible;pointer-events:auto;transition:transform .22s ease}
.drawer-handle{display:none}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--line)}
.drawer-head strong{font-size:14.5px}
.drawer-body{overflow-y:auto;padding:14px 16px;font-size:14px;flex:1}
.drawer-foot{display:flex;gap:8px;padding:12px 16px calc(12px + var(--safe-b));border-top:1px solid var(--line)}
.drawer-foot button{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;background:#efe9de;color:var(--ink)}
.drawer-foot button.primary{background:var(--accent);color:#fff}
.drawer-foot button.danger{background:#fbe4e4;color:#a13a3a}
.hist-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;position:relative}
.hist-card .tag{font-size:10.5px;font-weight:800;color:var(--sub);margin-bottom:4px}
.hist-card .x{position:absolute;right:8px;top:8px;border:none;background:transparent;color:var(--sub);font-size:15px;cursor:pointer}
.note-line{color:var(--sub);font-size:12px;margin-top:10px;line-height:1.6}

/* ---------- document library slide-over ---------- */
.main-col{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;min-height:0;height:100%;position:relative;overflow:hidden}
.lib-scrim{position:absolute;inset:0;background:rgba(20,17,12,.34);z-index:59;opacity:0;pointer-events:none;transition:opacity .2s}
.lib-scrim.show{opacity:1;pointer-events:auto}
.lib{
  position:absolute;top:0;bottom:0;left:0;width:min(86vw,340px);max-width:calc(100vw - 28px);
  height:100vh;height:100dvh;background:var(--paper);overflow:hidden;
  z-index:60;transform:translateX(-100%);transition:transform .22s ease;display:flex;flex-direction:column;
  box-shadow:6px 0 20px rgba(0,0,0,.15)
}
.lib.show{transform:translateX(0)}
.lib-head{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + var(--safe-t)) 12px 12px 16px;border-bottom:1px solid var(--line)}
.lib-head strong{font-size:16px}
.lib-body{flex:1;min-height:0;overflow-y:auto;padding:8px 6px 14px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.work-group{margin-bottom:6px}
.work-row{display:flex;align-items:center;gap:2px;min-height:44px;padding:2px;border-radius:10px;background:#f5f1ea;color:var(--ink)}
.work-row.active{background:#eee5d9}
.work-toggle,.lib-item-menu{width:40px;height:40px;border:none;background:transparent;border-radius:9px;color:var(--sub);font-size:15px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;touch-action:manipulation}
.work-toggle:active,.lib-item-menu:active{background:var(--line)}
.work-name{flex:1;min-width:0;min-height:40px;border:none;background:transparent;text-align:left;padding:0 4px;font-weight:750;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;touch-action:manipulation}
.episode-list{padding:2px 0 4px 12px}
.doc-row{display:flex;align-items:center;gap:3px;min-height:40px;padding:1px 2px 1px 6px;font-size:13.25px;border-radius:9px;color:#4a453b}
.doc-row.active{background:#f1e9dd;color:var(--accent);font-weight:700}
.doc-row.reference:not(.active){background:#edf2f5}
.doc-name{flex:1;min-width:0;min-height:38px;border:none;background:transparent;text-align:left;padding:0 4px;color:inherit;font:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;touch-action:manipulation}
.doc-badge{font-size:9px;color:#566c7a;border:1px solid #bfcdd6;background:#fff;border-radius:999px;padding:2px 5px;white-space:nowrap}
.work-count{flex:0 0 auto;color:var(--sub);font-size:10.5px;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:999px;padding:2px 6px;white-space:nowrap}
.lib-add{display:block;width:100%;border:none;background:transparent;text-align:left;padding:8px 8px 8px 18px;font-size:13px;color:var(--accent);font-weight:700;border-radius:8px;cursor:pointer}
.lib-add:active{background:var(--line)}
.lib-empty{padding:8px 12px 12px 22px;color:var(--sub);font-size:12px}
.lib-foot{padding:10px 12px calc(10px + var(--safe-b));border-top:1px solid var(--line)}
.lib-foot button{width:100%;border:1px dashed var(--line);background:transparent;border-radius:10px;padding:10px;font-size:13.5px;font-weight:700;color:var(--sub)}

/* ---------- library item action sheet ---------- */
.lib-action-scrim{position:absolute;inset:0;background:rgba(20,17,12,.42);z-index:70;opacity:0;pointer-events:none;transition:opacity .2s}
.lib-action-scrim.show{opacity:1;pointer-events:auto}
.lib-action-sheet{position:absolute;left:0;right:0;bottom:0;z-index:71;background:var(--paper);border-radius:18px 18px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.18);transform:translateY(100%);transition:transform .22s ease;max-height:74vh;display:flex;flex-direction:column}
.lib-action-sheet.show{transform:translateY(0)}
.lib-action-handle{width:36px;height:4px;background:#ddd5c6;border-radius:2px;margin:9px auto 4px}
.lib-action-head{display:flex;align-items:center;justify-content:space-between;padding:5px 16px 10px;border-bottom:1px solid var(--line)}
.lib-action-head strong{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:10px}
.lib-action-body{padding:8px 10px calc(10px + var(--safe-b));overflow-y:auto}
.lib-action-body button{display:flex;align-items:center;justify-content:space-between;width:100%;border:none;background:transparent;border-radius:10px;padding:13px 12px;text-align:left;font-size:14px;color:var(--ink);cursor:pointer}
.lib-action-body button:active{background:var(--line)}
.lib-action-body button.danger{color:#b33b3b}
.lib-action-body .menu-note{padding:5px 12px 10px;color:var(--sub);font-size:11.5px;line-height:1.5}

/* ---------- reference document ---------- */
.reference-pane{display:none;min-width:0;background:var(--paper);border-right:1px solid var(--line);flex-direction:column;overflow:hidden}
.reference-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--paper)}
.reference-head strong{flex:1;min-width:0;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reference-body{flex:1;overflow-y:auto;padding:22px 20px calc(24px + var(--safe-b));font-size:16.5px;line-height:1.9;white-space:pre-wrap;word-break:keep-all;background:var(--bg)}
.reference-screen{position:absolute;inset:0;background:var(--bg);z-index:46;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease}
.reference-screen.show{transform:translateX(0)}
.reference-screen .reference-body{padding-bottom:calc(24px + var(--safe-b))}

/* ---------- preview ---------- */
.preview-screen{position:absolute;inset:0;height:100%;min-height:0;background:var(--bg);z-index:120;display:flex;flex-direction:column;overflow:hidden;transform:translateX(100%);transition:transform .2s ease;visibility:hidden}
.preview-screen.show{transform:translateX(0);visibility:visible}
.preview-body-wrap{position:relative;flex:1;min-height:0;overflow:hidden}
.preview-body{height:100%;overflow-y:auto;overflow-x:hidden;padding:22px 26px 36px 20px;font-size:16.5px;line-height:1.9;white-space:pre-wrap;word-break:keep-all;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.preview-scroll-track{position:absolute;right:7px;top:10px;bottom:10px;width:3px;border-radius:3px;background:rgba(125,117,104,.14);pointer-events:none}
.preview-scroll-thumb{position:absolute;left:0;right:0;top:0;min-height:28px;border-radius:3px;background:rgba(125,117,104,.58);transform:translateY(0)}
.preview-foot{flex:0 0 auto;display:flex;gap:8px;padding:10px 16px calc(10px + var(--safe-b));border-top:1px solid var(--line);background:var(--paper);z-index:2}
.preview-foot button{flex:1;border:none;border-radius:12px;padding:11px;font-size:13.5px;font-weight:700;background:#efe9de;cursor:pointer}
.preview-foot button.primary{background:var(--accent);color:#fff}
#device.preview-mode .statusbar,#device.preview-mode .patch-fab,#device.preview-mode .radial-menu,#device.preview-mode .actionbar{visibility:hidden!important;pointer-events:none!important}

/* ---------- menu sheet (⋮) ---------- */
.menu-sheet{position:absolute;top:calc(52px + var(--safe-t));right:12px;background:var(--paper);border:1px solid var(--line);
  border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.15);z-index:55;overflow-y:auto;max-height:72vh;min-width:210px;
  opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .15s ease}
.menu-sheet.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.menu-sheet button,.menu-file-label{display:block;width:100%;text-align:left;border:none;background:transparent;padding:12px 16px;font-size:13.5px;color:var(--ink);cursor:pointer;text-decoration:none}
.menu-sheet button:active,.menu-file-label:active{background:var(--line)}
.menu-sheet button:disabled{opacity:.38;cursor:default}
.menu-file-label:focus-visible{outline:2px solid var(--accent);outline-offset:-3px}
.visually-hidden-file{position:fixed!important;left:-9999px!important;top:-9999px!important;width:1px!important;height:1px!important;opacity:.001!important;pointer-events:none!important}

/* ---------- dialogs (rename/export/etc) ---------- */
.modal-scrim{position:fixed;inset:0;background:rgba(20,17,12,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-scrim.show{display:flex}
.modal{background:var(--paper);border-radius:16px;width:100%;max-width:340px;padding:18px;max-height:80vh;display:flex;flex-direction:column}
.modal h3{margin:0 0 12px;font-size:15px}
.modal textarea, .modal input, .modal select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;margin-bottom:10px}
.modal textarea{min-height:120px;resize:vertical}
.modal select{appearance:auto;background:#fff}
.modal .row{display:flex;gap:8px;margin-top:4px}
.modal .row button{flex:1;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;background:#efe9de;cursor:pointer}
.modal .row button.primary{background:var(--accent);color:#fff}
.export-body{overflow-y:auto;flex:1;background:#f4efe4;border-radius:10px;padding:12px;font-size:12.5px;white-space:pre-wrap;font-family:"SF Mono",Consolas,monospace;line-height:1.6;margin-bottom:10px}


/* ---------- phone library compact accordion ---------- */
@media (max-width:839px){
  #device{max-width:none}
  .modal input,.modal textarea,.modal select,.inline-note-editor{font-size:16px}
  .lib{width:88vw;max-width:340px}
  .lib-head{padding:calc(10px + var(--safe-t)) 8px 8px 14px;min-height:54px}
  .lib-body{padding:7px 6px}
  .work-group{margin-bottom:5px}
  .work-row{min-height:46px;padding:2px;border-radius:10px;cursor:pointer}
  .work-toggle,.lib-item-menu{width:42px;height:42px;font-size:16px}
  .work-name{padding:10px 2px;font-size:13.5px}
  .episode-list{padding:2px 0 4px 8px;margin-left:17px;border-left:1px solid #eee7dc}
  .doc-row{min-height:40px;padding:2px 2px 2px 6px;gap:3px}
  .doc-name{padding:9px 2px;font-size:13px}
  .lib-add{padding:10px 8px 10px 10px}
  .lib-empty{padding-left:11px}
}
@media (max-width:380px){

/* ---------------- visible viewport / mobile keyboard ---------------- */
let viewportSyncFrame=0,lastKeyboardOpen=null,lastVisualHeight=0;
function syncVisibleViewport(){
  cancelAnimationFrame(viewportSyncFrame);

    const vv=window.visualViewport;
    const layoutHeight=Math.max(320,Math.round(window.innerHeight||document.documentElement.clientHeight||0));
    const visualHeight=vv?Math.max(320,Math.round(vv.height)):layoutHeight;

    if(radialMenu?.classList.contains('show')&&(keyboardStateChanged||largeViewportShift))closeRadial();

    const appTop=keyboardOpen?Math.max(0,Math.round(vv.offsetTop||0)):0;

/* ---------------- data / project ---------------- */
let project=loadProject();
function emptyProject(){return {version:VERSION,works:[],activeWorkId:null,activeDocId:null,referenceWorkId:null,referenceDocId:null}}
function seedProject(){
  const workId=uid('w'),docId=uid('d');
  return {version:VERSION,works:[{id:workId,title:'설렘의 방향',_open:true,lastActiveDocId:docId,docs:[{
    id:docId,title:'7화. 날카로운 선 위에서',
    body:'<p>전체 리딩이 열리는 대회의실 앞에서 윤정은 잠깐 멈췄다.</p><p>손에 든 대본을 천천히 다시 쥐었다.</p><p>수십 번을 들춰봤던 대본인데, 오늘따라 묘한 이질감이 느껴졌다.</p><p>문을 열었다.</p><p>사람이 많았다. 제작팀, 스태프, 배우들, 뒤편에는 기자 몇 명까지.</p>'
  }]}],activeWorkId:workId,activeDocId:docId,referenceWorkId:null,referenceDocId:null};
}
function parseStringArray(value){
  try{const parsed=JSON.parse(value||'[]');return Array.isArray(parsed)?parsed.filter(v=>typeof v==='string'):[];}catch{return[];}
}
function normalizeImportedMarkup(rawHtml,seenIds){
  const box=document.createElement('div');box.innerHTML=String(rawHtml||'');
  const ids=seenIds||new Set();
  box.querySelectorAll('.inline-textarea,.edit-marker').forEach(el=>el.remove());
  box.querySelectorAll(ANN_SELECTOR).forEach(el=>{
    let id=el.dataset.id||'';
    if(!id||ids.has(id)){id=uid('a');el.dataset.id=id;}
    ids.add(id);
    if(el.classList.contains('modified')){
      let versions=parseStringArray(el.dataset.versions);
      if(!versions.length){
        const history=parseStringArray(el.dataset.history);
        const original=el.dataset.original||history[0]||el.textContent||'';
        const current=el.dataset.current||el.textContent||original;
        versions=history.length?history.slice():[original];
        if(!versions.length||versions[0]!==original)versions.unshift(original);
        if(versions[versions.length-1]!==current)versions.push(current);
      }
      if(!versions.length)versions=[el.textContent||''];
      el.dataset.versions=JSON.stringify(versions);
      if(!el.dataset.original)el.dataset.original=versions[0]||'';
      if(!el.dataset.current)el.dataset.current=versions[versions.length-1]||el.textContent||'';
    }else if(el.classList.contains('deleted')){
      if(!el.dataset.original)el.dataset.original=el.textContent||'';
    }else if(el.classList.contains('suggestion')){
      if(!el.dataset.original)el.dataset.original=el.textContent||'';
      if(el.dataset.suggestion===undefined)el.dataset.suggestion='';
    }else if(el.classList.contains('memo')){
      if(!el.dataset.memo)el.dataset.memo=el.textContent||'';
    }
    if(!el.classList.contains('pending-edit'))el.setAttribute('contenteditable','false');
  });
  return box.innerHTML;
}
function projectSummary(p){
  const works=Array.isArray(p?.works)?p.works:[];
  return{workCount:works.length,docCount:works.reduce((sum,w)=>sum+(Array.isArray(w.docs)?w.docs.length:0),0)};
}
function normalizeProject(data){
  if(data&&Array.isArray(data.docs)&&!Array.isArray(data.works)){
    const oldWorkId=data.workId||uid('w');
    data={version:data.version,works:[{id:oldWorkId,title:data.projectTitle||'기존 작품',expanded:true,lastActiveDocId:data.activeId||null,docs:data.docs}],activeWorkId:oldWorkId,activeDocId:data.activeId||null,referenceWorkId:data.referenceId?oldWorkId:null,referenceDocId:data.referenceId||null};
  }
  if(!data||!Array.isArray(data.works))return emptyProject();
  const seenAnnotationIds=new Set();
  const p={version:VERSION,sourceVersion:String(data.version||''),works:[],activeWorkId:data.activeWorkId||null,activeDocId:data.activeDocId||data.activeId||null,referenceWorkId:data.referenceWorkId||null,referenceDocId:data.referenceDocId||data.referenceId||null};
  p.works=data.works.map((w,wi)=>({
    id:w.id||uid('w'),title:w.title||`작품 ${wi+1}`,_open:w._open!==undefined?w._open:(w.expanded!==false),lastActiveDocId:w.lastActiveDocId||null,
    docs:Array.isArray(w.docs)?w.docs.map((d,di)=>({
      id:d.id||uid('d'),title:d.title||`회차 ${di+1}`,
      body:normalizeImportedMarkup(d.body??d.html??d.content??'',seenAnnotationIds)
    })):[]
  }));

}
function repairProject(p=project){
  p.works=Array.isArray(p.works)?p.works:[];
  p.works.forEach((w,wi)=>{
    w.id=w.id||uid('w');w.title=w.title||`작품 ${wi+1}`;w._open=w._open!==false;w.docs=Array.isArray(w.docs)?w.docs:[];
    w.docs=w.docs.map((d,di)=>({id:d.id||uid('d'),title:d.title||`회차 ${di+1}`,body:String(d.body??d.html??'')}));
    if(!w.docs.some(d=>d.id===w.lastActiveDocId))w.lastActiveDocId=w.docs[0]?.id||null;
  });

  const aw=p.works.find(w=>w.id===p.activeWorkId)||null;
  if(!aw?.docs.some(d=>d.id===p.activeDocId))p.activeDocId=aw?.lastActiveDocId||aw?.docs[0]?.id||null;

/* ---------------- in-memory undo / redo ---------------- */
let undoStack=[],redoStack=[],typingHistoryOpen=false,typingHistoryTimer=0;
function snapshotProject(){persistActiveToMemory();repairProject(project);return JSON.stringify(project);}
function updateHistoryButtons(){

function pushUndoSnapshot(snapshot,label='작업'){
  if(!snapshot)return;

  undoStack.push({snapshot,label});

}

function undoAction(){

const PATCH_POSITIONS=['br','bl','mr','ml'];

function autoPatchPosition(){
  if(patchDragging||radialMenu.classList.contains('show'))return effectivePatchPosition;
  const rect=currentSelectionRect();if(!rect||!rect.width&&!rect.height)return preferredPatchPosition;
  const sr=stage.getBoundingClientRect(),cx=rect.left+rect.width/2-sr.left,cy=rect.top+rect.height/2-sr.top;
  const side=cx>sr.width/2?'l':'r';
  if(cy>sr.height*.48)return side==='l'?'mr':'ml';
  const pref=patchCoords(preferredPatchPosition),near=Math.hypot(pref.x-cx,pref.y-cy)<165;
  return near?(side==='l'?'br':'bl'):preferredPatchPosition;
}
function updatePatchPlacement(forcePos=null){
  if(!stage||!patchFab)return;
  const pos=forcePos||autoPatchPosition();effectivePatchPosition=PATCH_POSITIONS.includes(pos)?pos:'br';
  const c=patchCoords(effectivePatchPosition);patchFab.style.left=`${c.x}px`;patchFab.style.top=`${c.y}px`;
  patchFab.dataset.pos=effectivePatchPosition;patchFab.classList.toggle('auto-avoiding',effectivePatchPosition!==preferredPatchPosition);
  if(radialMenu?.classList.contains('show'))positionRadialItems();
}
function setPreferredPatchPosition(pos,announce=true){
  if(!PATCH_POSITIONS.includes(pos))return;preferredPatchPosition=pos;effectivePatchPosition=pos;
  try{localStorage.setItem(PATCH_POSITION_KEY,pos);}catch{}
  updatePatchPlacement(pos);if(announce)flashSnack(`PATCH 버튼을 ${patchPositionLabel(pos)}에 고정했습니다.`);
}
function snapPatchPosition(clientX,clientY){
  const sr=stage.getBoundingClientRect(),x=clientX-sr.left,y=clientY-sr.top;
  let best='br',dist=Infinity;
  for(const pos of PATCH_POSITIONS){const c=patchCoords(pos),d=Math.hypot(c.x-x,c.y-y);if(d<dist){dist=d;best=pos;}}
  setPreferredPatchPosition(best,true);
}
function openPatchPositionModal(){
  modalBox.innerHTML=`<h3>PATCH 버튼 위치</h3><select id="patchPositionSelect"><option value="br">오른쪽 아래</option><option value="bl">왼쪽 아래</option><option value="mr">오른쪽 가운데</option><option value="ml">왼쪽 가운데</option></select><p style="font-size:12px;color:var(--sub);line-height:1.55;margin:0 0 12px">PATCH 버튼을 길게 눌러 직접 옮길 수도 있습니다. 선택 영역과 겹치면 잠시 반대편으로 이동합니다.</p><div class="row"><button id="ppCancel">취소</button><button class="primary" id="ppApply">적용</button></div>`;
  modalScrim.classList.add('show');const select=$('#patchPositionSelect',modalBox);select.value=preferredPatchPosition;
  $('#ppCancel',modalBox).onclick=closeModal;$('#ppApply',modalBox).onclick=()=>{setPreferredPatchPosition(select.value,true);closeModal();};
}
function beginPatchDragPointer(event){
  if(inlineState||drawer.classList.contains('show')||previewScreen.classList.contains('show'))return;
  capturePatchContext();patchContextLocked=true;clearTimeout(patchLongPressTimer);patchSuppressClick=false;
  patchLongPressTimer=setTimeout(()=>{patchDragging=true;patchSuppressClick=true;closeRadial();patchFab.classList.add('dragging');try{patchFab.setPointerCapture(event.pointerId);}catch{};navigator.vibrate?.(15);},420);
}
function movePatchDragPointer(event){
  if(!patchDragging)return;event.preventDefault();const sr=stage.getBoundingClientRect(),r=28;
  const x=Math.max(r,Math.min(sr.width-r,event.clientX-sr.left)),y=Math.max(r,Math.min(sr.height-r,event.clientY-sr.top));
  patchFab.style.left=`${x}px`;patchFab.style.top=`${y}px`;
}
function endPatchDragPointer(event){
  clearTimeout(patchLongPressTimer);
  if(!patchDragging)return;
  patchDragging=false;patchFab.classList.remove('dragging');snapPatchPosition(event.clientX,event.clientY);patchContextLocked=false;
  setTimeout(()=>{patchSuppressClick=false;},120);
}

let libraryMenuTarget=null;

function normalizeMobileLibraryOpenState(preferredWorkId=project.activeWorkId){
  if(isTablet())return;
  const opened=project.works.filter(w=>w._open!==false);
  if(opened.length<=1)return;
  const keep=opened.find(w=>w.id===preferredWorkId)||opened[0];
  project.works.forEach(w=>{w._open=w.id===keep.id;});
}
function openOnlyWorkOnMobile(workId){
  if(isTablet())return;
  project.works.forEach(w=>{w._open=w.id===workId;});
}
function toggleWorkPanel(workId){
  const work=findWork(workId);if(!work)return;
  const willOpen=work._open===false;
  if(willOpen)openOnlyWorkOnMobile(workId);

  renderLibrary();
  saveProject(false);
}

  libBody.innerHTML='';

    const group=document.createElement('section');group.className='work-group';
    const row=document.createElement('div');row.className='work-row'+(work.id===project.activeWorkId?' active':'');

    toggle.className='work-toggle';toggle.textContent=work._open?'▾':'▸';toggle.title=work._open?'작품 접기':'작품 펼치기';

function uniqueCopyTitle(items,title){const base=`${title} - 복사본`;if(!items.some(x=>x.title===base))return base;let n=2;while(items.some(x=>x.title===`${base} ${n}`))n++;return`${base} ${n}`;}

function duplicateEpisode(workId,docId){
  const work=findWork(workId),source=findDoc(workId,docId);if(!work||!source)return false;saveProject(false);recordHistory('회차 복사');
  const index=work.docs.findIndex(d=>d.id===docId);const copy={id:uid('d'),title:uniqueCopyTitle(work.docs,source.title),body:cloneEpisodeBody(source.body)};
  work.docs.splice(index+1,0,copy);work.lastActiveDocId=copy.id;project.activeWorkId=work.id;project.activeDocId=copy.id;openOnlyWorkOnMobile(work.id);work._open=true;loadActiveIntoEditor();saveProject();flashSnack('회차 복사본을 바로 아래에 만들었습니다.');return true;
}
function duplicateWork(workId){
  const source=findWork(workId);if(!source)return false;saveProject(false);recordHistory('작품 복사');
  const index=project.works.findIndex(w=>w.id===workId);const sourceActiveIndex=source.docs.findIndex(d=>d.id===source.lastActiveDocId);
  const docs=source.docs.map(doc=>({id:uid('d'),title:doc.title,body:cloneEpisodeBody(doc.body)}));
  const copy={id:uid('w'),title:uniqueCopyTitle(project.works,source.title),_open:true,lastActiveDocId:docs[Math.max(0,sourceActiveIndex)]?.id||docs[0]?.id||null,docs};
  project.works.splice(index+1,0,copy);project.activeWorkId=copy.id;project.activeDocId=copy.lastActiveDocId;openOnlyWorkOnMobile(copy.id);loadActiveIntoEditor();saveProject();flashSnack(`작품과 하위 회차 ${docs.length}개를 복사했습니다.`);return true;

function renameEpisode(workId,docId){const doc=findDoc(workId,docId);if(!doc)return;showTextModal('회차 이름 바꾸기','회차 제목',doc.title,val=>{const title=val.trim();if(!title)return;recordHistory('회차 이름 변경');doc.title=title;updateTitle();renderLibrary();renderReference();saveProject();});}
function openReorderModal(type,workId,docId){

function deleteEpisode(workId,docId,skipConfirm=false){

  saveProject(false);recordHistory('작품 삭제');project.works.splice(index,1);if(project.referenceWorkId===workId){project.referenceWorkId=null;project.referenceDocId=null;}

/* ---------------- clean text / preview / count ---------------- */
function finalTextFrom(root){
  let out='';
  function walk(node){
    if(node.nodeType===Node.TEXT_NODE){out+=cleanEditableText(node.data);return;}
    if(node.nodeType!==Node.ELEMENT_NODE)return;
    const el=node;

function getVersions(el){
  try{const v=JSON.parse(el.dataset.versions||'[]');if(Array.isArray(v)&&v.length)return v.map(String);}catch{}
  const original=el.dataset.original||el.textContent,current=el.textContent;return original===current?[original]:[original,current];
}

  const clean=versions.map(String);el.dataset.versions=JSON.stringify(clean);el.dataset.original=clean[0]||'';el.dataset.current=clean.at(-1)||'';el.textContent=clean.at(-1)||'';el.contentEditable='false';
}

/* ---------------- preview ---------------- */
let previewPlainText='';
function updatePreviewScrollbar(){
  if(!previewBody||!previewScrollTrack||!previewScrollThumb)return;
  const visible=previewBody.clientHeight,total=previewBody.scrollHeight;
  if(total<=visible+2){previewScrollTrack.style.display='none';return;}
  previewScrollTrack.style.display='block';const track=previewScrollTrack.clientHeight;
  const thumb=Math.max(28,track*(visible/total)),max=Math.max(0,track-thumb),top=max*(previewBody.scrollTop/Math.max(1,total-visible));
  previewScrollThumb.style.height=`${thumb}px`;previewScrollThumb.style.transform=`translateY(${top}px)`;
}
function closePreview(){previewScreen.classList.remove('show');device.classList.remove('preview-mode');previewBody.scrollTop=0;updatePatchPlacement();}
function openPreview(){
  if(inlineState){flashSnack('먼저 현재 패치를 적용하거나 취소해 주세요.');return;}
  persistActiveToMemory();closeRadial();closeDrawer();closeLibraryActionSheet();menuSheet.classList.remove('show');editor.blur();try{getSelection().removeAllRanges();}catch{}
  previewPlainText=finalTextFrom(editor);previewBody.textContent=previewPlainText;previewBody.scrollTop=0;device.classList.add('preview-mode');previewScreen.classList.add('show');
  requestAnimationFrame(updatePreviewScrollbar);
}
previewBtn.onclick=openPreview;previewBackBtn.onclick=closePreview;previewBody.addEventListener('scroll',updatePreviewScrollbar,{passive:true});
$('#previewCopyBtn').onclick=async event=>{const ok=await copyText(previewPlainText,'본문을 복사했습니다.');if(ok)showCopiedButtonState(event.currentTarget,'복사됨 ✓','본문 복사');};
$('#previewAiBtn').onclick=buildExportDialog;$('#previewExportBtn').onclick=openExportOptions;

/* ---------------- AI export in DOM order / ✦ section ---------------- */
function sectionOf(node){
  try{const r=document.createRange();r.setStart(editor,0);r.setEndBefore(node);const box=document.createElement('div');box.appendChild(r.cloneContents());return(finalTextFrom(box).match(/✦/g)||[]).length+1;}catch{return 1;}
}
function buildAiText(){
  const w=activeWork(),d=activeDoc();const nodes=$all(EXPORT_SELECTOR,editor).filter(n=>!n.classList.contains('pending-edit'));
  const lines=['================================',`《${w?.title||''}》`,d?.title||'','================================',''];
  if(!nodes.length){lines.push('등록된 교정 지시가 없습니다.');return lines.join('\n');}
  nodes.forEach((n,i)=>{
    lines.push(`[교정 ${String(i+1).padStart(3,'0')}]`,`위치: ${sectionOf(n)}구획`);
    if(n.classList.contains('modified')){
      const versions=getVersions(n);lines.push('작업: 수정','',`원문:\n${versions[0]||''}`,'',`수정문:\n${n.textContent}`);
      if(versions.length>2)lines.push('',`수정 이력:\n${versions.slice(1).map((v,j)=>`${j+1}차: ${v}`).join('\n')}`);
    }else if(n.classList.contains('added'))lines.push('작업: 추가','',`추가문:\n${n.textContent}`);
    else if(n.classList.contains('deleted'))lines.push('작업: 삭제','',`삭제 원문:\n${n.dataset.original||n.textContent}`);
    else lines.push('작업: 제안','',`원문:\n${n.dataset.original||n.textContent}`,'',`제안:\n${n.dataset.suggestion||''}`);
    lines.push('','--------------------------------','');
  });
  return lines.join('\n');
}
function buildExportDialog(){
  const text=buildAiText();modalBox.innerHTML=`<h3>AI 전달용 교정 지시서</h3><div class="export-body">${esc(text)}</div><div class="row"><button id="exCopy">복사</button><button class="primary" id="exClose">닫기</button></div>`;
  modalScrim.classList.add('show');$('#exCopy',modalBox).onclick=async event=>{const ok=await copyText(text,'지시서를 복사했습니다.');if(ok)showCopiedButtonState(event.currentTarget,'복사됨 ✓','복사');};$('#exClose',modalBox).onclick=closeModal;
}

/* ---------------- TXT / JSON import-export ---------------- */
function safeName(s){return String(s||'Story_Patcher').replace(/[\\/:*?"<>|]+/g,'_').trim()||'Story_Patcher';}
function timestamp(){const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;}
function downloadFile(content,name,type='text/plain;charset=utf-8'){
  const url=URL.createObjectURL(new Blob([content],{type}));const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function showCopiedButtonState(button,successLabel,normalLabel){
  if(!button)return;button.disabled=true;button.textContent=successLabel;setTimeout(()=>{button.disabled=false;button.textContent=normalLabel;},1300);
}
async function copyText(text,msg){
  const value=String(text||'');if(!value){flashSnack('복사할 내용이 없습니다.');return false;}
  try{if(navigator.clipboard?.writeText&&window.isSecureContext){await navigator.clipboard.writeText(value);flashSnack(msg);return true;}}catch(error){console.warn('Clipboard API failed',error);}
  if(fallbackCopy(value)){flashSnack(msg);return true;}
  showManualCopy(value);return false;
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('aria-label','복사할 텍스트');ta.autocapitalize='off';ta.autocomplete='off';ta.spellcheck=false;
  Object.assign(ta.style,{position:'fixed',left:'1px',top:'1px',width:'1px',height:'1px',fontSize:'16px',opacity:'0',zIndex:'9999',border:'0',padding:'0'});
  document.body.appendChild(ta);try{ta.focus({preventScroll:true});}catch{ta.focus();}ta.setSelectionRange(0,ta.value.length);
  let ok=false;try{ok=document.execCommand('copy');}catch{}ta.remove();return ok;
}
function showManualCopy(text){
  modalBox.innerHTML=`<h3>직접 복사</h3><p style="font-size:12.5px;color:var(--sub);line-height:1.55;margin:0 0 10px">iOS가 자동 복사를 막았습니다. 아래 본문을 길게 눌러 전체 선택한 뒤 복사해 주세요.</p><textarea id="manualCopyText" style="min-height:220px"></textarea><div class="row"><button id="manualSelect">전체 선택</button><button class="primary" id="manualClose">닫기</button></div>`;
  modalScrim.classList.add('show');const ta=$('#manualCopyText',modalBox);ta.value=text;
  $('#manualSelect',modalBox).onclick=()=>{ta.focus();ta.setSelectionRange(0,ta.value.length);};$('#manualClose',modalBox).onclick=closeModal;
}
function readFileText(file){if(file&&typeof file.text==='function')return file.text();return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(String(r.result||''));r.onerror=()=>reject(r.error||new Error('파일 읽기 실패'));r.readAsText(file,'utf-8');});}
function exportTxt(){const d=activeDoc();if(!d){flashSnack('열린 회차가 없습니다.');return;}downloadFile(finalTextFrom(editor),`${safeName(d.title)}.txt`);flashSnack('TXT 최종 원고를 내보냈습니다.');}
function exportJson(){if(inlineState){flashSnack('먼저 현재 패치를 적용하거나 취소해 주세요.');return;}persistActiveToMemory();repairProject(project);const data=JSON.parse(JSON.stringify(project));data.format='story-patcher-project';data.schemaVersion=1;data.version=VERSION;data.exportedAt=new Date().toISOString();data.works.forEach(w=>{w.expanded=w._open!==false;w.docs.forEach(d=>{d.html=d.body||'';});});downloadFile(JSON.stringify(data,null,2),`Story_Patcher_프로젝트_${timestamp()}.json`,'application/json;charset=utf-8');markProjectClean();flashSnack('PC·모바일 호환 JSON을 내보냈습니다.');}
function duplicateActiveDoc(){const w=activeWork(),d=activeDoc();if(w&&d)duplicateEpisode(w.id,d.id);}
async function importTxtFiles(files){
  if(!files.length)return;recordHistory('TXT 원문 불러오기');let w=activeWork();if(!w){w={id:uid('w'),title:'가져온 작품',docs:[],_open:true,lastActiveDocId:null};project.works.push(w);project.activeWorkId=w.id;}
  for(const f of files){const text=await readFileText(f);const title=f.name.replace(/\.[^.]+$/,'')||`회차 ${w.docs.length+1}`;const doc={id:uid('d'),title,body:textToHtml(text)};w.docs.push(doc);w.lastActiveDocId=doc.id;}
  const last=w.docs.at(-1);openDoc(w.id,last.id);markProjectDirty();flashSnack(`${files.length}개 TXT 원문을 불러왔습니다.`);
}
function textToHtml(text){return esc(String(text||'').replace(/\r\n?/g,'\n')).split(/\n{2,}/).map(b=>`<p>${b.replace(/\n/g,'<br>')}</p>`).join('');}
async function importJsonFile(file){
  if(!file)return;
  saveStatus.textContent='JSON 읽는 중…';saveStatus.style.color='';
  try{
    const raw=(await readFileText(file)).replace(/^\uFEFF/,'');
    const data=JSON.parse(raw);
    if(!data||(!Array.isArray(data.works)&&!Array.isArray(data.docs)))throw new Error('Story Patcher 프로젝트 형식이 아닙니다.');
    const imported=normalizeProject(data);
    const summary=projectSummary(imported);
    if(!summary.workCount||!summary.docCount)throw new Error('작품 또는 회차가 없는 프로젝트입니다.');
    const sourceVersion=String(data.version||'이전 버전');
    const apply=()=>{
      project=imported;normalizeMobileLibraryOpenState(project.activeWorkId);loadActiveIntoEditor();clearHistory();markProjectClean();
      flashSnack(`PC 프로젝트 v${sourceVersion} · 작품 ${summary.workCount}개 · 회차 ${summary.docCount}개를 불러왔습니다.`);
    };
    if(project.works.length)showConfirmModal('프로젝트 불러오기',`현재 프로젝트를 PC 프로젝트 v${sourceVersion}로 교체할까요?\n\n작품 ${summary.workCount}개 · 회차 ${summary.docCount}개`,'교체',apply,true);else apply();
  }catch(error){
    console.error(error);updateSaveStatus();showConfirmModal('불러오기 실패',error?.message||'JSON 파일을 읽지 못했습니다.','확인',()=>{});
  }
}
function prepareFileInput(input){input.value='';}

  label.addEventListener('pointerdown',()=>prepareFileInput(input));
  label.addEventListener('click',()=>{menuSheet.classList.remove('show');});

    if(event.key!=='Enter'&&event.key!==' ')return;
    event.preventDefault();prepareFileInput(input);menuSheet.classList.remove('show');
    try{if(typeof input.showPicker==='function')input.showPicker();else input.click();}catch{input.click();}
  });
}
bindFileLabel(txtImportLabel,txtImportInput);
bindFileLabel(jsonImportLabel,jsonImportInput);
txtImportInput.addEventListener('click',()=>prepareFileInput(txtImportInput));
jsonImportInput.addEventListener('click',()=>prepareFileInput(jsonImportInput));
txtImportInput.onchange=async event=>{const files=[...(event.target.files||[])];event.target.value='';await importTxtFiles(files);};
jsonImportInput.onchange=async event=>{const file=event.target.files?.[0];event.target.value='';if(file)await importJsonFile(file);};
function openExportOptions(){
  modalBox.innerHTML='<h3>내보내기</h3><div class="row" style="flex-direction:column"><button id="opTxt">TXT 최종 원고</button><button id="opAi">AI 교정 지시서</button><button id="opJson">프로젝트 JSON 백업</button><button id="opClose">닫기</button></div>';
  modalScrim.classList.add('show');$('#opTxt').onclick=()=>{closeModal();exportTxt();};$('#opAi').onclick=()=>{closeModal();buildExportDialog();};$('#opJson').onclick=()=>{closeModal();exportJson();};$('#opClose').onclick=closeModal;

/* ---------------- top menu ---------------- */
menuBtn.addEventListener('click',e=>{e.stopPropagation();updateHistoryButtons();menuSheet.classList.toggle('show');});
document.addEventListener('click',e=>{if(!menuSheet.contains(e.target)&&e.target!==menuBtn)menuSheet.classList.remove('show');});
menuSheet.addEventListener('click',e=>{
  const m=e.target.closest('[data-m]');if(!m)return;menuSheet.classList.remove('show');const action=m.dataset.m;
  if(action==='undo')undoAction();else if(action==='redo')redoAction();else if(action==='patchPosition')openPatchPositionModal();else if(action==='exportAi')buildExportDialog();else if(action==='exportTxt')exportTxt();else if(action==='exportJson')exportJson();else if(action==='duplicateDoc')duplicateActiveDoc();
  else if(action==='renameDoc'){const w=activeWork(),d=activeDoc();if(w&&d)renameEpisode(w.id,d.id);}
  else if(action==='deleteDoc'){const w=activeWork(),d=activeDoc();if(w&&d)deleteEpisode(w.id,d.id);}

/* ---------------- editor input and empty-span guard ---------------- */
function inlineTextareaEvent(event){return isInlineTextarea(event?.target);}
editor.addEventListener('beforeinput',event=>{
  if(inlineTextareaEvent(event))return; // Native textarea owns IME, Enter, deletion and selection.
  if(!inlineState&&event.inputType&&(event.inputType.startsWith('insert')||event.inputType.startsWith('delete')))beginTypingHistory();
});
editor.addEventListener('input',event=>{
  if(inlineTextareaEvent(event)){autoSizeInlineTextarea(event.target);updateCharCount();return;}
  updateCharCount();
  if(!inlineState)scheduleSave();
});
editor.addEventListener('keydown',event=>{
  if(inlineTextareaEvent(event))return;
  if(!inlineState)return;
  if(event.key==='Escape'){event.preventDefault();cancelInline();return;}
  if((event.ctrlKey||event.metaKey)&&event.key==='Enter'){event.preventDefault();confirmInline();}
});
editor.addEventListener('blur',()=>{/* explicit confirm/cancel only */});

/* ---------------- boot ---------------- */
function boot(){
  syncVisibleViewport();
  repairProject(project);normalizeMobileLibraryOpenState();loadActiveIntoEditor();clearHistory();updateSaveStatus();if(isTablet())libPanel.classList.add('show');renderReference();
  requestAnimationFrame(()=>{syncVisibleViewport();updatePatchPlacement(preferredPatchPosition);});
}
boot();

window.__STORY_PATCHER_TEST__={finalText:()=>finalTextFrom(editor),aiText:buildAiText,getProject:()=>project,normalizeProjectData:data=>normalizeProject(data),applyProjectData:data=>{project=normalizeProject(data);normalizeMobileLibraryOpenState(project.activeWorkId);loadActiveIntoEditor();return projectSummary(project);},openPreview,annotationsInRange,duplicateWork,duplicateEpisode,openReference,closeReference,startAdd,startMemo,startModify,startSuggest,refreshSelectionState,inline:()=>inlineState?{mode:inlineState.mode,editableText:editableValue(inlineState.editable),editableTag:inlineState.editable?.tagName,targetText:inlineState.target?.textContent,editableConnected:inlineState.editable?.isConnected,targetConnected:inlineState.target?.isConnected}:null,confirm:confirmInline,cancel:cancelInline,autosize:autoSizeInlineTextarea};
})();
