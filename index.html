<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Story Patcher · Mobile v0.3.1</title>
<style>
:root{
  --bg:#faf8f5; --paper:#fffdfb; --ink:#2b2620; --sub:#7d7568; --line:#e7e1d6;
  --modified:#ffe49a; --modified-line:#e0b94a;
  --added:#d8f0d3; --added-line:#7fbf6f;
  --suggested:#eadfff; --suggested-line:#b48af0;
  --deleted:#d84a4a;
  --memo:#dbe5ec; --memo-line:#91a6b5;
  --accent:#b5482e; --accent-ink:#fff;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overscroll-behavior:none}
body{
  font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:#1c1a17; color:var(--ink); display:flex; justify-content:center;
}
#device{
  width:100%; max-width:480px; min-height:100vh; background:var(--bg);
  display:flex; flex-direction:column; position:relative; overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,.4);
}
/* ---------- appbar ---------- */
.appbar{
  display:flex; align-items:center; gap:10px; padding:calc(10px + var(--safe-t)) 12px 10px;
  border-bottom:1px solid var(--line); background:var(--paper); flex:0 0 auto; z-index:20;
}
.iconbtn{width:38px;height:38px;border:none;background:transparent;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--ink);cursor:pointer;flex:0 0 auto}
.iconbtn:active{background:var(--line)}
.title{flex:1;min-width:0;font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.title small{display:block;font-size:11px;font-weight:500;color:var(--sub)}

/* ---------- editor ---------- */
.stage{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.paper-scroll{flex:1;overflow-y:auto;padding:22px 20px 140px;-webkit-overflow-scrolling:touch}
#editor{font-size:17px;line-height:1.9;outline:none;min-height:60vh;white-space:pre-wrap;word-break:keep-all}
#editor:empty:before{content:"문서함에서 회차를 열거나 새로 추가해 주세요.";color:#b3aa9c}
#editor:focus{caret-color:var(--accent)}
.modified{background:var(--modified);border-radius:2px;padding:0 1px}
.added{background:var(--added);border-radius:2px;padding:0 1px}
.suggestion{background:var(--suggested);border-radius:2px;padding:0 1px}
.deleted{color:#b23b3b;text-decoration:line-through;text-decoration-color:var(--deleted);opacity:.72}
.memo{display:inline-block;background:var(--memo);color:#3d5160;border:1px dashed var(--memo-line);
  border-radius:5px;padding:1px 6px;font-size:.85em}
.memo::before{content:"메모";font-size:9px;font-weight:800;color:#5c7180;margin-right:4px}
.pending-edit{outline:2px solid var(--accent);outline-offset:1px;border-radius:3px;padding:0 2px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.pending-edit.is-empty{min-width:1.2em}
.modified.pending-edit.is-empty::after,.added.pending-edit.is-empty::after{content:"내용 입력";color:#b8aa9a;font-size:.82em}
.inline-edit-buffer{display:inline-block;min-width:1.2em;min-height:1.2em;outline:none;white-space:pre-wrap;word-break:keep-all;vertical-align:baseline}
.inline-edit-buffer.is-empty::after{content:attr(data-placeholder);color:#b8aa9a;font-size:.82em}
.modified.pending-edit,.added.pending-edit{display:inline-block;min-width:1.25em;vertical-align:baseline}
.pending-target{outline:1px solid currentColor;outline-offset:1px}
.inline-note-editor{display:block;min-height:50px;margin:10px 0;padding:10px 12px;border-radius:9px;white-space:pre-wrap;word-break:break-word;line-height:1.65}
.inline-note-editor.suggest-note{background:var(--suggested);border:1px solid var(--suggested-line)}
.inline-note-editor.memo-note{background:var(--memo);border:1px solid var(--memo-line);color:#334956}
.inline-note-editor.is-empty::before{content:attr(data-placeholder);color:#998f84;pointer-events:none}
.edit-marker{display:inline-block!important;width:0!important;height:0!important;overflow:hidden!important;font-size:0!important;line-height:0!important;vertical-align:baseline!important}

/* ---------- bottom status ---------- */
.statusbar{
  flex:0 0 auto; display:flex; justify-content:space-between; align-items:center;
  padding:8px 16px calc(8px + var(--safe-b)); font-size:11.5px; color:var(--sub);
  border-top:1px solid var(--line); background:var(--paper); z-index:20;
}
.statusbar .saved{color:#4c8c5b;font-weight:600}

/* ---------- PATCH floating button + radial ---------- */
.patch-fab{
  position:absolute; right:18px; bottom:calc(64px + var(--safe-b)); width:56px; height:56px;
  border-radius:50%; border:none; background:var(--accent); color:var(--accent-ink);
  font-size:13px; font-weight:800; letter-spacing:.02em; box-shadow:0 6px 16px rgba(181,72,46,.4);
  z-index:30; display:flex; align-items:center;justify-content:center; cursor:pointer;
  transition:transform .15s ease;
}
.patch-fab.disabled{background:#c7bfae;box-shadow:none}
.patch-fab.open{transform:scale(.94)}
.radial-menu{position:absolute;inset:0;z-index:29;pointer-events:none}
.radial-menu.show{pointer-events:auto}
.radial-item{
  position:absolute;right:18px;bottom:calc(64px + var(--safe-b));
  display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);
  border-radius:22px;padding:9px 16px 9px 12px;font-size:14px;font-weight:600;color:var(--ink);
  box-shadow:0 4px 10px rgba(0,0,0,.12);cursor:pointer;white-space:nowrap;
  opacity:0;transform:translate(0,0) scale(.72);transition:transform .2s cubic-bezier(.2,.9,.25,1.18),opacity .15s ease;
}
.radial-menu.show .radial-item{opacity:1;transform:translate(var(--rx),var(--ry)) scale(1)}
.radial-item .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.radial-item[data-act="modify"] .dot{background:var(--modified-line)}
.radial-item[data-act="add"] .dot{background:var(--added-line)}
.radial-item[data-act="delete"] .dot{background:var(--deleted)}
.radial-item[data-act="suggest"] .dot{background:var(--suggested-line)}
.radial-item[data-act="memo"] .dot{background:var(--memo-line)}
.radial-scrim{position:absolute;inset:0;z-index:25;background:transparent;display:none}
.radial-scrim.show{display:block}
.sel-count{
  position:absolute; left:16px; bottom:calc(64px + var(--safe-b)); font-size:11.5px; color:var(--sub);
  background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:6px 12px; z-index:28;
}

/* ---------- inline action bar (above keyboard) ---------- */
.actionbar{
  position:absolute; left:0; right:0; bottom:0; z-index:40; background:var(--paper);
  border-top:1px solid var(--line); padding:8px 12px calc(8px + var(--safe-b));
  display:flex; align-items:center; gap:8px; transform:translateY(100%); transition:transform .18s ease;
}
.actionbar.show{transform:translateY(0)}
.actionbar .kind{font-size:12px;font-weight:700;color:var(--sub);flex:0 0 auto;padding-right:2px}
.actionbar .spacer{flex:1}
.actionbar button{
  border:none;background:#efe9de;color:var(--ink);border-radius:16px;padding:8px 14px;
  font-size:13.5px;font-weight:700;cursor:pointer;
}
.actionbar button.primary{background:var(--accent);color:#fff}
.actionbar button.ghost{background:transparent;color:var(--sub)}

/* ---------- snackbar ---------- */
.snackbar{
  position:absolute; left:16px; right:16px; bottom:calc(132px + var(--safe-b)); z-index:35;
  background:#2b2620; color:#f3efe6; border-radius:10px; padding:11px 14px; font-size:13px;
  display:flex; justify-content:space-between; align-items:center; gap:12px;
  transform:translateY(20px); opacity:0; pointer-events:none; transition:all .2s ease;
}
.snackbar.show{transform:translateY(0);opacity:1;pointer-events:auto}
.snackbar button{background:transparent;border:none;color:#ffb59a;font-weight:700;font-size:13px;cursor:pointer}

/* ---------- bottom drawer (management) ---------- */
.scrim{position:absolute;inset:0;background:rgba(20,17,12,.42);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{
  position:absolute; left:0; right:0; bottom:0; z-index:51; background:var(--paper);
  border-radius:18px 18px 0 0; box-shadow:0 -8px 24px rgba(0,0,0,.18);
  max-height:55vh; display:flex; flex-direction:column; transform:translateY(100%);
  transition:transform .22s ease;
}
.drawer.show{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:#ddd5c6;border-radius:2px;margin:9px auto 4px}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px;border-bottom:1px solid var(--line)}
.drawer-head strong{font-size:14.5px}
.drawer-body{overflow-y:auto;padding:14px 16px;font-size:14px;flex:1}
.drawer-foot{display:flex;gap:8px;padding:12px 16px calc(12px + var(--safe-b));border-top:1px solid var(--line)}
.drawer-foot button{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;background:#efe9de;color:var(--ink)}
.drawer-foot button.primary{background:var(--accent);color:#fff}
.drawer-foot button.danger{background:#fbe4e4;color:#a13a3a}
.hist-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;position:relative}
.hist-card .tag{font-size:10.5px;font-weight:800;color:var(--sub);margin-bottom:4px}
.hist-card .x{position:absolute;right:8px;top:8px;border:none;background:transparent;color:var(--sub);font-size:15px;cursor:pointer}
.note-line{color:var(--sub);font-size:12px;margin-top:10px;line-height:1.6}

/* ---------- document library slide-over ---------- */
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.lib-scrim{position:absolute;inset:0;background:rgba(20,17,12,.34);z-index:59;opacity:0;pointer-events:none;transition:opacity .2s}
.lib-scrim.show{opacity:1;pointer-events:auto}
.lib{
  position:absolute;top:0;bottom:0;left:0;width:88%;max-width:360px;background:var(--paper);
  z-index:60;transform:translateX(-100%);transition:transform .22s ease;display:flex;flex-direction:column;
  box-shadow:6px 0 20px rgba(0,0,0,.15)
}
.lib.show{transform:translateX(0)}
.lib-head{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + var(--safe-t)) 12px 12px 16px;border-bottom:1px solid var(--line)}
.lib-head strong{font-size:16px}
.lib-body{flex:1;overflow-y:auto;padding:10px 8px}
.work-group{margin-bottom:6px}
.work-row{display:flex;align-items:center;gap:4px;padding:5px 4px;border-radius:10px;background:#f5f1ea;color:var(--ink)}
.work-row.active{background:#eee5d9}
.work-toggle,.lib-item-menu{width:34px;height:34px;border:none;background:transparent;border-radius:9px;color:var(--sub);font-size:15px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer}
.work-toggle:active,.lib-item-menu:active{background:var(--line)}
.work-name{flex:1;min-width:0;border:none;background:transparent;text-align:left;padding:7px 4px;font-weight:750;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.episode-list{padding:4px 0 2px 18px}
.doc-row{display:flex;align-items:center;gap:6px;padding:5px 4px 5px 8px;font-size:13.5px;border-radius:9px;color:#4a453b}
.doc-row.active{background:#f1e9dd;color:var(--accent);font-weight:700}
.doc-row.reference:not(.active){background:#edf2f5}
.doc-name{flex:1;min-width:0;border:none;background:transparent;text-align:left;padding:7px 2px;color:inherit;font:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.doc-badge{font-size:9px;color:#566c7a;border:1px solid #bfcdd6;background:#fff;border-radius:999px;padding:2px 5px;white-space:nowrap}
.lib-add{display:block;width:100%;border:none;background:transparent;text-align:left;padding:9px 10px 9px 22px;font-size:13px;color:var(--accent);font-weight:700;border-radius:8px;cursor:pointer}
.lib-add:active{background:var(--line)}
.lib-empty{padding:8px 12px 12px 22px;color:var(--sub);font-size:12px}
.lib-foot{padding:10px 12px calc(10px + var(--safe-b));border-top:1px solid var(--line)}
.lib-foot button{width:100%;border:1px dashed var(--line);background:transparent;border-radius:10px;padding:10px;font-size:13.5px;font-weight:700;color:var(--sub)}

/* ---------- library item action sheet ---------- */
.lib-action-scrim{position:absolute;inset:0;background:rgba(20,17,12,.42);z-index:70;opacity:0;pointer-events:none;transition:opacity .2s}
.lib-action-scrim.show{opacity:1;pointer-events:auto}
.lib-action-sheet{position:absolute;left:0;right:0;bottom:0;z-index:71;background:var(--paper);border-radius:18px 18px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.18);transform:translateY(100%);transition:transform .22s ease;max-height:74vh;display:flex;flex-direction:column}
.lib-action-sheet.show{transform:translateY(0)}
.lib-action-handle{width:36px;height:4px;background:#ddd5c6;border-radius:2px;margin:9px auto 4px}
.lib-action-head{display:flex;align-items:center;justify-content:space-between;padding:5px 16px 10px;border-bottom:1px solid var(--line)}
.lib-action-head strong{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:10px}
.lib-action-body{padding:8px 10px calc(10px + var(--safe-b));overflow-y:auto}
.lib-action-body button{display:flex;align-items:center;justify-content:space-between;width:100%;border:none;background:transparent;border-radius:10px;padding:13px 12px;text-align:left;font-size:14px;color:var(--ink);cursor:pointer}
.lib-action-body button:active{background:var(--line)}
.lib-action-body button.danger{color:#b33b3b}
.lib-action-body .menu-note{padding:5px 12px 10px;color:var(--sub);font-size:11.5px;line-height:1.5}

/* ---------- reference document ---------- */
.reference-pane{display:none;min-width:0;background:var(--paper);border-right:1px solid var(--line);flex-direction:column;overflow:hidden}
.reference-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--paper)}
.reference-head strong{flex:1;min-width:0;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reference-body{flex:1;overflow-y:auto;padding:22px 20px calc(24px + var(--safe-b));font-size:16.5px;line-height:1.9;white-space:pre-wrap;word-break:keep-all;background:var(--bg)}
.reference-screen{position:absolute;inset:0;background:var(--bg);z-index:46;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease}
.reference-screen.show{transform:translateX(0)}
.reference-screen .reference-body{padding-bottom:calc(24px + var(--safe-b))}

/* ---------- preview ---------- */
.preview-screen{position:absolute;inset:0;background:var(--bg);z-index:45;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease}
.preview-screen.show{transform:translateX(0)}
.preview-body{flex:1;overflow-y:auto;padding:22px 20px calc(24px + var(--safe-b));font-size:16.5px;line-height:1.9;white-space:pre-wrap;word-break:keep-all}
.preview-foot{display:flex;gap:8px;padding:10px 16px calc(10px + var(--safe-b));border-top:1px solid var(--line);background:var(--paper)}
.preview-foot button{flex:1;border:none;border-radius:12px;padding:11px;font-size:13.5px;font-weight:700;background:#efe9de;cursor:pointer}
.preview-foot button.primary{background:var(--accent);color:#fff}

/* ---------- menu sheet (⋮) ---------- */
.menu-sheet{position:absolute;top:calc(52px + var(--safe-t));right:12px;background:var(--paper);border:1px solid var(--line);
  border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,.15);z-index:55;overflow-y:auto;max-height:72vh;min-width:210px;
  opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .15s ease}
.menu-sheet.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.menu-sheet button{display:block;width:100%;text-align:left;border:none;background:transparent;padding:12px 16px;font-size:13.5px;color:var(--ink);cursor:pointer}
.menu-sheet button:active{background:var(--line)}

/* ---------- dialogs (rename/export/etc) ---------- */
.modal-scrim{position:fixed;inset:0;background:rgba(20,17,12,.5);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
.modal-scrim.show{display:flex}
.modal{background:var(--paper);border-radius:16px;width:100%;max-width:340px;padding:18px;max-height:80vh;display:flex;flex-direction:column}
.modal h3{margin:0 0 12px;font-size:15px}
.modal textarea, .modal input, .modal select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;margin-bottom:10px}
.modal textarea{min-height:120px;resize:vertical}
.modal select{appearance:auto;background:#fff}
.modal .row{display:flex;gap:8px;margin-top:4px}
.modal .row button{flex:1;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;background:#efe9de;cursor:pointer}
.modal .row button.primary{background:var(--accent);color:#fff}
.export-body{overflow-y:auto;flex:1;background:#f4efe4;border-radius:10px;padding:12px;font-size:12.5px;white-space:pre-wrap;font-family:"SF Mono",Consolas,monospace;line-height:1.6;margin-bottom:10px}


/* ---------- phone library compact accordion ---------- */
@media (max-width:839px){
  #device{max-width:none}
  .lib{width:88vw;max-width:340px}
  .lib-head{padding:calc(10px + var(--safe-t)) 8px 8px 14px;min-height:54px}
  .lib-body{padding:7px 6px}
  .work-group{margin-bottom:5px}
  .work-row{min-height:46px;padding:2px;border-radius:10px;cursor:pointer}
  .work-toggle,.lib-item-menu{width:42px;height:42px;font-size:16px}
  .work-name{padding:10px 2px;font-size:13.5px}
  .episode-list{padding:2px 0 4px 8px;margin-left:17px;border-left:1px solid #eee7dc}
  .doc-row{min-height:40px;padding:2px 2px 2px 6px;gap:3px}
  .doc-name{padding:9px 2px;font-size:13px}
  .lib-add{padding:10px 8px 10px 10px}
  .lib-empty{padding-left:11px}
}
@media (max-width:380px){
  .lib{width:calc(100vw - 32px);max-width:none}
  .doc-badge{display:none}
}

/* ---------- tablet layout ---------- */
@media (min-width:840px){
  body{align-items:stretch}
  #device{max-width:1360px;margin:0 auto;flex-direction:row;box-shadow:0 0 40px rgba(0,0,0,.35)}
  .lib{position:static;transform:none;width:280px;max-width:280px;box-shadow:none;border-right:1px solid var(--line)}
  .lib.hide-tablet{display:none}
  .lib-scrim{display:none!important}
  .main-col{flex:1;min-width:0;position:relative}
  .main-col.reference-open{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);grid-template-rows:auto minmax(0,1fr) auto}
  .main-col.reference-open>.appbar{grid-column:1/-1;grid-row:1}
  .main-col.reference-open>.reference-pane{display:flex;grid-column:1;grid-row:2/4}
  .main-col.reference-open>.stage{grid-column:2;grid-row:2;min-height:0}
  .main-col.reference-open>.statusbar{grid-column:2;grid-row:3}
  .reference-screen{display:none!important}
  .patch-fab{right:26px}
  .lib-action-sheet{left:50%;right:auto;width:min(440px,calc(100% - 40px));transform:translate(-50%,100%)}
  .lib-action-sheet.show{transform:translate(-50%,0)}
}
</style>
</head>
<body>
<div id="device">

  <!-- ============ document library (slide-over on phone / fixed panel on tablet) ============ -->
  <div class="lib-scrim" id="libScrim"></div>
  <aside class="lib" id="libPanel">
    <div class="lib-head"><strong>문서함</strong><button class="iconbtn" id="libCloseBtn">✕</button></div>
    <div class="lib-body" id="libBody"></div>
    <div class="lib-foot"><button id="libAddWorkBtn">＋ 작품 추가</button></div>
  </aside>

  <div class="main-col">
    <!-- ============ appbar ============ -->
    <header class="appbar">
      <button class="iconbtn" id="openLibBtn" title="문서함">☰</button>
      <div class="title"><span id="docTitleText">작품과 회차를 추가해 주세요</span><small id="workTitleSmall">&nbsp;</small></div>
      <button class="iconbtn" id="previewBtn" title="미리보기">👁</button>
      <button class="iconbtn" id="menuBtn" title="메뉴">⋮</button>
    </header>

    <!-- ============ tablet reference pane ============ -->
    <section class="reference-pane" id="referencePane">
      <div class="reference-head"><strong id="referencePaneTitle">참고 문서</strong><button class="iconbtn" id="referencePaneCloseBtn" title="참고 문서 닫기">✕</button></div>
      <div class="reference-body" id="referencePaneBody"></div>
    </section>

    <!-- ============ editor stage ============ -->
    <div class="stage" id="stage">
      <div class="paper-scroll" id="paperScroll">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
      </div>

      <div class="sel-count" id="selCount" style="display:none"></div>

      <div class="radial-scrim" id="radialScrim"></div>
      <div class="radial-menu" id="radialMenu"></div>
      <button class="patch-fab" id="patchFab">PATCH</button>

      <div class="snackbar" id="snackbar">
        <span id="snackbarText"></span>

<!-- ============ generic modal (rename / add / export text) ============ -->

<script>
(function(){
"use strict";
const $=(s,r=document)=>r.querySelector(s);
const $all=(s,r=document)=>Array.from(r.querySelectorAll(s));
const uid=(p='n')=>p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const cleanEditableText=s=>String(s??'').replace(/[\u200B\u2060]/g,'');

const editor=$('#editor'), paperScroll=$('#paperScroll');
const patchFab=$('#patchFab'), radialMenu=$('#radialMenu'), radialScrim=$('#radialScrim'), selCount=$('#selCount');
const actionbar=$('#actionbar'), actionbarKind=$('#actionbarKind'), actOriginal=$('#actOriginal'), actCancel=$('#actCancel'), actConfirm=$('#actConfirm');
const snackbar=$('#snackbar'), snackbarText=$('#snackbarText'), snackbarUndo=$('#snackbarUndo');
const drawer=$('#drawer'), drawerScrim=$('#drawerScrim'), drawerTitle=$('#drawerTitle'), drawerBody=$('#drawerBody'), drawerFoot=$('#drawerFoot'), drawerCloseBtn=$('#drawerCloseBtn');
const libPanel=$('#libPanel'), libBody=$('#libBody'), libScrim=$('#libScrim'), openLibBtn=$('#openLibBtn'), libCloseBtn=$('#libCloseBtn'), libAddWorkBtn=$('#libAddWorkBtn');
const libActionScrim=$('#libActionScrim'), libActionSheet=$('#libActionSheet'), libActionTitle=$('#libActionTitle'), libActionBody=$('#libActionBody'), libActionCloseBtn=$('#libActionCloseBtn');
const mainCol=$('.main-col'), referencePane=$('#referencePane'), referencePaneTitle=$('#referencePaneTitle'), referencePaneBody=$('#referencePaneBody'), referencePaneCloseBtn=$('#referencePaneCloseBtn');
const referenceScreen=$('#referenceScreen'), referenceScreenTitle=$('#referenceScreenTitle'), referenceScreenBody=$('#referenceScreenBody'), referenceBackBtn=$('#referenceBackBtn'), referenceScreenCloseBtn=$('#referenceScreenCloseBtn');
const docTitleText=$('#docTitleText'), workTitleSmall=$('#workTitleSmall');
const previewScreen=$('#previewScreen'), previewBody=$('#previewBody'), previewBtn=$('#previewBtn'), previewBackBtn=$('#previewBackBtn');
const charCount=$('#charCount'), saveStatus=$('#saveStatus');
const menuBtn=$('#menuBtn'), menuSheet=$('#menuSheet');
const modalScrim=$('#modalScrim'), modalBox=$('#modalBox');
const txtImportInput=$('#txtImportInput'), jsonImportInput=$('#jsonImportInput');
const isTablet=()=>window.innerWidth>=840;

const VERSION='0.3.1';
const STORAGE_KEY='story_patcher_mobile_v03';
const LEGACY_KEYS=['story_patcher_mobile_v02','story_patcher_mobile_v01'];
const ANN_SELECTOR='.modified,.added,.suggestion,.deleted,.memo';
const EXPORT_SELECTOR='.modified,.added,.suggestion,.deleted';
const BLOCK_TAGS=new Set(['P','DIV','LI','BLOCKQUOTE','H1','H2','H3','H4','H5','H6','SECTION','ARTICLE']);

/* ---------------- data / project ---------------- */
let project=loadProject();
function emptyProject(){return {version:VERSION,works:[],activeWorkId:null,activeDocId:null,referenceWorkId:null,referenceDocId:null}}
function seedProject(){
  // GitHub Pages 공개 배포용: 샘플 원고 없이 빈 프로젝트로 시작합니다.
  return emptyProject();
}
function normalizeProject(data){
  if(data&&Array.isArray(data.docs)&&!Array.isArray(data.works)){
    data={version:data.version,works:[{id:uid('w'),title:data.projectTitle||'기존 작품',expanded:true,lastActiveDocId:data.activeId||null,docs:data.docs}],activeWorkId:null,activeDocId:data.activeId||null,referenceWorkId:null,referenceDocId:data.referenceId||null};
  }
  if(!data||!Array.isArray(data.works))return seedProject();
  const p={version:VERSION,works:[],activeWorkId:data.activeWorkId||null,activeDocId:data.activeDocId||null,referenceWorkId:data.referenceWorkId||null,referenceDocId:data.referenceDocId||null};
  p.works=data.works.map((w,wi)=>({
    id:w.id||uid('w'),title:w.title||`작품 ${wi+1}`,_open:w._open!==undefined?w._open:(w.expanded!==false),lastActiveDocId:w.lastActiveDocId||null,
    docs:Array.isArray(w.docs)?w.docs.map((d,di)=>({id:d.id||uid('d'),title:d.title||`회차 ${di+1}`,body:d.body??d.html??''})):[]
  }));
  repairProject(p);
  return p;
}
function repairProject(p=project){
  p.works=Array.isArray(p.works)?p.works:[];
  p.works.forEach((w,wi)=>{
    w.id=w.id||uid('w');w.title=w.title||`작품 ${wi+1}`;w._open=w._open!==false;w.docs=Array.isArray(w.docs)?w.docs:[];
    w.docs=w.docs.map((d,di)=>({id:d.id||uid('d'),title:d.title||`회차 ${di+1}`,body:d.body??d.html??''}));
    if(!w.docs.some(d=>d.id===w.lastActiveDocId))w.lastActiveDocId=w.docs[0]?.id||null;
  });
  if(!p.works.some(w=>w.id===p.activeWorkId))p.activeWorkId=p.works[0]?.id||null;
  const aw=p.works.find(w=>w.id===p.activeWorkId)||null;
  if(!aw?.docs.some(d=>d.id===p.activeDocId))p.activeDocId=aw?.lastActiveDocId||aw?.docs[0]?.id||null;
  if(p.referenceWorkId&&p.referenceDocId){
    const rw=p.works.find(w=>w.id===p.referenceWorkId);
    if(!rw?.docs.some(d=>d.id===p.referenceDocId)){p.referenceWorkId=null;p.referenceDocId=null;}
  }else{p.referenceWorkId=null;p.referenceDocId=null;}
  p.version=VERSION;
  return p;
}
function loadProject(){
  try{
    let raw=localStorage.getItem(STORAGE_KEY);
    if(!raw){for(const key of LEGACY_KEYS){raw=localStorage.getItem(key);if(raw)break;}}
    return raw?normalizeProject(JSON.parse(raw)):seedProject();
  }catch{return seedProject();}
}
function findWork(workId){return project.works.find(w=>w.id===workId)||null}
function activeWork(){return findWork(project.activeWorkId)}
function activeDoc(){return activeWork()?.docs.find(d=>d.id===project.activeDocId)||null}
function findDoc(workId,docId){return findWork(workId)?.docs.find(d=>d.id===docId)||null}
function referenceInfo(){const work=findWork(project.referenceWorkId),doc=findDoc(project.referenceWorkId,project.referenceDocId);return work&&doc?{work,doc}:null}
function saveProject(showStatus=true){
  const doc=activeDoc();if(doc)doc.body=editor.innerHTML;
  repairProject(project);
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(project));syncReferenceBodies();if(showStatus)flashSaved();}
  catch{saveStatus.textContent='저장 실패';saveStatus.style.color='#a13a3a';}
}
let saveTimer=null;
function scheduleSave(){saveStatus.textContent='저장 중…';saveStatus.style.color='';clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveProject(),450);}
function flashSaved(){saveStatus.textContent='저장됨 ✓';saveStatus.style.color='';}

/* ---------------- library / work / episode management ---------------- */
let libraryMenuTarget=null;

function normalizeMobileLibraryOpenState(preferredWorkId=project.activeWorkId){
  if(isTablet())return;
  const opened=project.works.filter(w=>w._open!==false);
  if(opened.length<=1)return;
  const keep=opened.find(w=>w.id===preferredWorkId)||opened[0];
  project.works.forEach(w=>{w._open=w.id===keep.id;});
}
function openOnlyWorkOnMobile(workId){
  if(isTablet())return;
  project.works.forEach(w=>{w._open=w.id===workId;});
}
function toggleWorkPanel(workId){
  const work=findWork(workId);if(!work)return;
  const willOpen=work._open===false;
  if(willOpen)openOnlyWorkOnMobile(workId);
  work._open=willOpen;
  renderLibrary();
  saveProject(false);
}
function renderLibrary(){
  libBody.innerHTML='';
  if(!project.works.length){libBody.innerHTML='<div class="lib-empty">먼저 작품을 추가한 뒤<br>그 아래에 회차를 넣어주세요.</div>';return;}
  project.works.forEach(work=>{
    const group=document.createElement('section');group.className='work-group';
    const row=document.createElement('div');row.className='work-row'+(work.id===project.activeWorkId?' active':'');
    row.setAttribute('role','group');
    const toggle=document.createElement('button');
    toggle.className='work-toggle';toggle.textContent=work._open?'▾':'▸';toggle.title=work._open?'작품 접기':'작품 펼치기';
    toggle.setAttribute('aria-expanded',String(work._open!==false));
    toggle.onclick=e=>{e.stopPropagation();toggleWorkPanel(work.id);};
    const name=document.createElement('button');name.className='work-name';name.textContent=work.title;
    name.title=isTablet()?'작품 열기':'작품 회차 접기·펼치기';
    name.onclick=e=>{e.stopPropagation();if(isTablet())activateWork(work.id);else toggleWorkPanel(work.id);};
    const menu=document.createElement('button');menu.className='lib-item-menu';menu.textContent='⋮';menu.title='작품 옵션';menu.onclick=e=>{e.stopPropagation();openLibraryActionSheet('work',work.id,null);};
    row.onclick=e=>{if(e.target.closest('.lib-item-menu,.work-toggle,.work-name'))return;if(isTablet())activateWork(work.id);else toggleWorkPanel(work.id);};
    row.append(toggle,name,menu);group.appendChild(row);
    if(work._open){
      const episodes=document.createElement('div');episodes.className='episode-list';
      if(!work.docs.length){const empty=document.createElement('div');empty.className='lib-empty';empty.textContent='아직 회차가 없습니다.';episodes.appendChild(empty);}
      work.docs.forEach(doc=>{
        const dr=document.createElement('div');
        const active=work.id===project.activeWorkId&&doc.id===project.activeDocId;
        const ref=work.id===project.referenceWorkId&&doc.id===project.referenceDocId;
        dr.className='doc-row'+(active?' active':'')+(ref?' reference':'');
        const docName=document.createElement('button');docName.className='doc-name';docName.textContent=doc.title;docName.onclick=()=>openDoc(work.id,doc.id);
        dr.appendChild(docName);
        if(ref){const badge=document.createElement('span');badge.className='doc-badge';badge.textContent='참고';dr.appendChild(badge);}
        const docMenu=document.createElement('button');docMenu.className='lib-item-menu';docMenu.textContent='⋮';docMenu.title='회차 옵션';docMenu.onclick=e=>{e.stopPropagation();openLibraryActionSheet('doc',work.id,doc.id);};
        dr.appendChild(docMenu);episodes.appendChild(dr);
      });
      const add=document.createElement('button');add.className='lib-add';add.textContent='＋ 회차 추가';add.onclick=()=>promptAddDoc(work.id);episodes.appendChild(add);
      group.appendChild(episodes);
    }
    libBody.appendChild(group);
  });
}

function loadActiveIntoEditor(){const doc=activeDoc();editor.innerHTML=doc?.body||'';updateTitle();updateCharCount();renderLibrary();renderReference();}
function activateWork(workId){
  const work=findWork(workId);if(!work)return;if(inlineState)cancelInline();saveProject(false);
  project.activeWorkId=work.id;openOnlyWorkOnMobile(work.id);work._open=true;const next=work.docs.find(d=>d.id===work.lastActiveDocId)||work.docs[0]||null;project.activeDocId=next?.id||null;if(next)work.lastActiveDocId=next.id;
  loadActiveIntoEditor();saveProject(false);
}
function openDoc(workId,docId){
  if(inlineState)cancelInline();if(activeDoc())saveProject(false);
  const work=findWork(workId),doc=findDoc(workId,docId);if(!work||!doc)return;
  project.activeWorkId=workId;project.activeDocId=docId;work.lastActiveDocId=docId;openOnlyWorkOnMobile(workId);work._open=true;
  loadActiveIntoEditor();saveProject(false);if(!isTablet())closeLib();
}
function updateTitle(){const w=activeWork(),d=activeDoc();docTitleText.textContent=d?d.title:(w?'회차를 추가해 주세요':'작품과 회차를 추가해 주세요');workTitleSmall.textContent=w?.title||' ';}
function openLib(){if(inlineState){flashSnack('진행 중인 편집을 먼저 적용하거나 취소해 주세요.');return;}libPanel.classList.remove('hide-tablet');libPanel.classList.add('show');if(!isTablet())libScrim.classList.add('show');}
function closeLib(){if(isTablet())libPanel.classList.add('hide-tablet');else{libPanel.classList.remove('show');libScrim.classList.remove('show');}}
openLibBtn.onclick=openLib;libCloseBtn.onclick=closeLib;libScrim.onclick=closeLib;
libAddWorkBtn.onclick=()=>showTextModal('작품 추가','작품 제목','',val=>{
  const title=val.trim();if(!title)return;saveProject(false);const work={id:uid('w'),title,_open:true,lastActiveDocId:null,docs:[]};project.works.push(work);project.activeWorkId=work.id;project.activeDocId=null;openOnlyWorkOnMobile(work.id);loadActiveIntoEditor();saveProject();
});
function promptAddDoc(workId){const work=findWork(workId);if(!work)return;showTextModal('회차 추가','회차 제목','',val=>{
  const title=val.trim();if(!title)return;saveProject(false);const doc={id:uid('d'),title,body:''};work.docs.push(doc);work.lastActiveDocId=doc.id;openDoc(work.id,doc.id);
});}

function uniqueCopyTitle(items,title){const base=`${title} - 복사본`;if(!items.some(x=>x.title===base))return base;let n=2;while(items.some(x=>x.title===`${base} ${n}`))n++;return`${base} ${n}`;}
function cloneEpisodeBody(body){
  const box=document.createElement('div');box.innerHTML=body||'';
  $all('[data-id]',box).forEach(el=>{el.dataset.id=uid('a');});
  $all('.pending-edit',box).forEach(el=>{el.classList.remove('pending-edit','show-original');el.removeAttribute('contenteditable');});
  $all('.inline-note-editor,.edit-marker',box).forEach(el=>el.remove());
  return box.innerHTML;
}
function duplicateEpisode(workId,docId){
  const work=findWork(workId),source=findDoc(workId,docId);if(!work||!source)return false;saveProject(false);
  const index=work.docs.findIndex(d=>d.id===docId);const copy={id:uid('d'),title:uniqueCopyTitle(work.docs,source.title),body:cloneEpisodeBody(source.body)};
  work.docs.splice(index+1,0,copy);work.lastActiveDocId=copy.id;project.activeWorkId=work.id;project.activeDocId=copy.id;openOnlyWorkOnMobile(work.id);work._open=true;loadActiveIntoEditor();saveProject();flashSnack('회차 복사본을 바로 아래에 만들었습니다.');return true;
}
function duplicateWork(workId){
  const source=findWork(workId);if(!source)return false;saveProject(false);
  const index=project.works.findIndex(w=>w.id===workId);const sourceActiveIndex=source.docs.findIndex(d=>d.id===source.lastActiveDocId);
  const docs=source.docs.map(doc=>({id:uid('d'),title:doc.title,body:cloneEpisodeBody(doc.body)}));
  const copy={id:uid('w'),title:uniqueCopyTitle(project.works,source.title),_open:true,lastActiveDocId:docs[Math.max(0,sourceActiveIndex)]?.id||docs[0]?.id||null,docs};
  project.works.splice(index+1,0,copy);project.activeWorkId=copy.id;project.activeDocId=copy.lastActiveDocId;openOnlyWorkOnMobile(copy.id);loadActiveIntoEditor();saveProject();flashSnack(`작품과 하위 회차 ${docs.length}개를 복사했습니다.`);return true;
}
function renameWork(workId){const work=findWork(workId);if(!work)return;showTextModal('작품 이름 바꾸기','작품 제목',work.title,val=>{const title=val.trim();if(!title)return;work.title=title;updateTitle();renderLibrary();renderReference();saveProject();});}
function renameEpisode(workId,docId){const doc=findDoc(workId,docId);if(!doc)return;showTextModal('회차 이름 바꾸기','회차 제목',doc.title,val=>{const title=val.trim();if(!title)return;doc.title=title;updateTitle();renderLibrary();renderReference();saveProject();});}
function openReorderModal(type,workId,docId){
  const list=type==='work'?project.works:(findWork(workId)?.docs||[]);const id=type==='work'?workId:docId;const from=list.findIndex(x=>x.id===id);const item=list[from];if(!item)return;
  modalBox.innerHTML=`<h3>${type==='work'?'작품':'회차'} 순서 바꾸기</h3><p style="font-size:13px;color:var(--sub);line-height:1.55;margin:0 0 10px">“${esc(item.title)}”을 이동할 위치를 선택하세요.</p><select id="reorderSelect">${list.map((x,i)=>`<option value="${i}"${i===from?' selected':''}>${i+1}번째 · ${esc(x.title)}</option>`).join('')}</select><div class="row"><button id="rCancel">취소</button><button class="primary" id="rOk">이동</button></div>`;
  modalScrim.classList.add('show');$('#rCancel',modalBox).onclick=closeModal;$('#rOk',modalBox).onclick=()=>{const to=Number($('#reorderSelect',modalBox).value);closeModal();if(!Number.isInteger(to)||to===from)return;const [moved]=list.splice(from,1);list.splice(Math.max(0,Math.min(to,list.length)),0,moved);renderLibrary();saveProject();flashSnack('순서를 바꿨습니다.');};
}
function deleteEpisode(workId,docId,skipConfirm=false){
  const work=findWork(workId),index=work?.docs.findIndex(d=>d.id===docId)??-1;if(!work||index<0)return false;const doc=work.docs[index];
  if(!skipConfirm){showConfirmModal('회차 삭제',`“${doc.title}” 회차를 삭제할까요? 원문과 교정 이력이 함께 삭제됩니다.`,'삭제',()=>deleteEpisode(workId,docId,true),true);return false;}
  saveProject(false);work.docs.splice(index,1);if(project.referenceWorkId===workId&&project.referenceDocId===docId){project.referenceWorkId=null;project.referenceDocId=null;}
  if(project.activeWorkId===workId&&project.activeDocId===docId){const next=work.docs[Math.min(index,work.docs.length-1)]||null;project.activeDocId=next?.id||null;work.lastActiveDocId=next?.id||null;}else if(work.lastActiveDocId===docId)work.lastActiveDocId=work.docs[0]?.id||null;
  loadActiveIntoEditor();saveProject();flashSnack('회차를 삭제했습니다.');return true;
}
function deleteWork(workId,skipConfirm=false){
  const index=project.works.findIndex(w=>w.id===workId);if(index<0)return false;const work=project.works[index];
  if(!skipConfirm){showConfirmModal('작품 삭제',`“${work.title}” 작품과 포함된 회차 ${work.docs.length}개를 모두 삭제할까요?`,'작품 삭제',()=>deleteWork(workId,true),true);return false;}
  saveProject(false);project.works.splice(index,1);if(project.referenceWorkId===workId){project.referenceWorkId=null;project.referenceDocId=null;}
  if(project.activeWorkId===workId){const next=project.works[Math.min(index,project.works.length-1)]||null;project.activeWorkId=next?.id||null;project.activeDocId=next?.lastActiveDocId||next?.docs[0]?.id||null;}
  loadActiveIntoEditor();saveProject();flashSnack('작품을 삭제했습니다.');return true;
}

function openLibraryActionSheet(type,workId,docId){

/* ---------------- clean text / preview / count ---------------- */
function finalTextFrom(root){
  let out='';
  function walk(node){
    if(node.nodeType===Node.TEXT_NODE){out+=cleanEditableText(node.data);return;}
    if(node.nodeType!==Node.ELEMENT_NODE)return;
    const el=node;
    if(el.matches('.edit-marker,.inline-note-editor'))return;
    if(el.classList.contains('deleted'))return;
    if(el.classList.contains('memo')){out+=el.dataset.original||'';return;}
    if(el.classList.contains('suggestion')){out+=el.dataset.original||el.textContent;return;}
    if(el.tagName==='BR'){out+='\n';return;}
    const block=BLOCK_TAGS.has(el.tagName);
    [...el.childNodes].forEach(walk);
    if(block)out+='\n\n';
  }
  [...root.childNodes].forEach(walk);
  return out.replace(/\u00a0/g,' ').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
}
function updateCharCount(){
  const text=finalTextFrom(editor);const n=Array.from(text.replace(/\s/g,'')).length;
  charCount.textContent=`${n.toLocaleString('ko-KR')}자 · 삭제·메모 제외`;
}

  $all(ANN_SELECTOR,editor).forEach(el=>{try{if(range.intersectsNode(el))found.add(el);}catch{}});
  return [...found];
}

    st.target.dataset.memo=value;st.target.classList.remove('pending-target');st.editable.remove();caretTarget=st.target;
    undo=()=>{if(!st.target.isConnected)return;if(st.isNew){st.original?st.target.replaceWith(document.createTextNode(st.original)):st.target.remove();}else st.target.dataset.memo=st.oldValue;editor.normalize();scheduleSave();updateCharCount();};
    flashSnack('메모를 저장했습니다.',undo);
  }
  removeMarkers(st);inlineState=null;hideActionbar();editor.normalize();updateCharCount();scheduleSave();
  if(caretTarget?.isConnected)placeCaretAfter(caretTarget);editor.blur();
}

/* ---------------- management drawers ---------------- */
function openDrawer(){drawer.classList.add('show');drawerScrim.classList.add('show');}
function closeDrawer(){drawer.classList.remove('show');drawerScrim.classList.remove('show');}
drawerCloseBtn.onclick=closeDrawer;drawerScrim.onclick=closeDrawer;
editor.addEventListener('click',e=>{
  if(inlineState)return;const el=e.target.closest(ANN_SELECTOR);if(!el||!editor.contains(el)||el.classList.contains('pending-edit'))return;e.stopPropagation();
  if(el.classList.contains('modified'))openModifiedDrawer(el);else if(el.classList.contains('added'))openAddedDrawer(el);else if(el.classList.contains('suggestion'))openSuggestionDrawer(el);else if(el.classList.contains('memo'))openMemoDrawer(el);else openDeletedDrawer(el);
});
function getVersions(el){
  try{const v=JSON.parse(el.dataset.versions||'[]');if(Array.isArray(v)&&v.length)return v.map(String);}catch{}
  const original=el.dataset.original||el.textContent,current=el.textContent;return original===current?[original]:[original,current];
}
function setModifiedVersions(el,versions){
  const clean=versions.map(String);el.dataset.versions=JSON.stringify(clean);el.dataset.original=clean[0]||'';el.dataset.current=clean.at(-1)||'';el.textContent=clean.at(-1)||'';
}
function openModifiedDrawer(el){
  const versions=getVersions(el);drawerTitle.textContent='수정 이력';
  drawerBody.innerHTML=versions.map((v,i)=>`<div class="hist-card"><div class="tag">${i===0?'원문':i===versions.length-1?`${i}차 수정 · 현재`:`${i}차 수정`}</div><div>${esc(v)}</div>${i?`<button class="x" data-del="${i}">×</button>`:''}</div>`).join('');
  drawerFoot.innerHTML='<button id="mdRestore">원상복귀</button><button class="primary" id="mdRedo">다시 수정</button>';openDrawer();
  $all('[data-del]',drawerBody).forEach(b=>b.onclick=()=>{
    const idx=Number(b.dataset.del);versions.splice(idx,1);
    if(versions.length<=1){const original=versions[0]||el.dataset.original||'';el.replaceWith(document.createTextNode(original));editor.normalize();closeDrawer();flashSnack('모든 수정 이력을 지워 원문으로 복귀했습니다.');}
    else{setModifiedVersions(el,versions);openModifiedDrawer(el);}
    scheduleSave();updateCharCount();
  });
  $('#mdRestore').onclick=()=>{el.replaceWith(document.createTextNode(versions[0]||''));editor.normalize();closeDrawer();scheduleSave();updateCharCount();flashSnack('원문으로 복귀했습니다.');};
  $('#mdRedo').onclick=()=>{closeDrawer();startExistingModify(el);};
}
function openAddedDrawer(el){
  drawerTitle.textContent='추가문 관리';drawerBody.innerHTML=`<div class="hist-card"><div class="tag">추가문</div><div>${esc(el.textContent)}</div></div>`;
  drawerFoot.innerHTML='<button class="danger" id="adDelete">삭제</button><button class="primary" id="adEdit">수정</button>';openDrawer();
  $('#adDelete').onclick=()=>{closeDrawer();const text=el.textContent;el.remove();editor.normalize();scheduleSave();updateCharCount();flashSnack('추가문을 삭제했습니다.',()=>{});};
  $('#adEdit').onclick=()=>{closeDrawer();startExistingAdd(el);};
}
function openSuggestionDrawer(el){
  drawerTitle.textContent='제안 관리';drawerBody.innerHTML=`<div class="hist-card"><div class="tag">대상 문장</div><div>${esc(el.dataset.original||el.textContent)}</div></div><div class="hist-card"><div class="tag">제안 내용</div><div>${esc(el.dataset.suggestion||'')}</div></div>`;
  drawerFoot.innerHTML='<button class="danger" id="sgDelete">삭제</button><button class="primary" id="sgEdit">수정</button>';openDrawer();
  $('#sgDelete').onclick=()=>{closeDrawer();el.replaceWith(document.createTextNode(el.dataset.original||el.textContent));editor.normalize();scheduleSave();updateCharCount();flashSnack('제안을 삭제했습니다.');};
  $('#sgEdit').onclick=()=>{closeDrawer();startExistingNoteEdit(el,'suggest');};
}
function openMemoDrawer(el){
  drawerTitle.textContent='메모 확인';drawerBody.innerHTML=`<div class="hist-card"><div class="tag">메모</div><div>${esc(el.dataset.memo||'')}</div></div><p class="note-line">본문 복사·글자 수·미리보기·AI 지시서에서 제외됩니다. 전용 백업에는 포함됩니다.</p>`;
  drawerFoot.innerHTML='<button class="danger" id="mmDelete">삭제</button><button class="primary" id="mmEdit">수정</button>';openDrawer();
  const remove=()=>{el.dataset.original?el.replaceWith(document.createTextNode(el.dataset.original)):el.remove();editor.normalize();};
  $('#mmDelete').onclick=()=>{closeDrawer();remove();scheduleSave();updateCharCount();flashSnack('메모를 삭제했습니다.');};
  $('#mmEdit').onclick=()=>{closeDrawer();startExistingNoteEdit(el,'memo');};
}
function openDeletedDrawer(el){
  drawerTitle.textContent='삭제문 관리';drawerBody.innerHTML=`<div class="hist-card"><div class="tag">삭제된 원문</div><div>${esc(el.dataset.original||el.textContent)}</div></div>`;
  drawerFoot.innerHTML='<button id="dlRestore">복구</button><button class="danger" id="dlPurge">완전 삭제</button>';openDrawer();
  $('#dlRestore').onclick=()=>{closeDrawer();el.replaceWith(document.createTextNode(el.dataset.original||el.textContent));editor.normalize();scheduleSave();updateCharCount();flashSnack('삭제를 복구했습니다.');};
  $('#dlPurge').onclick=()=>{closeDrawer();showConfirmModal('완전 삭제','원문을 되돌릴 수 없이 영구히 제거합니다. 계속할까요?','완전 삭제',()=>{el.remove();editor.normalize();scheduleSave();updateCharCount();flashSnack('완전히 삭제했습니다.');},true);};
}

/* ---------------- snackbar ---------------- */
let snackTimer=null,snackUndoFn=null;
function flashSnack(msg,undoFn){snackbarText.textContent=msg;snackUndoFn=typeof undoFn==='function'?undoFn:null;snackbarUndo.style.display=snackUndoFn?'inline-block':'none';snackbar.classList.add('show');clearTimeout(snackTimer);snackTimer=setTimeout(()=>snackbar.classList.remove('show'),4600);}
snackbarUndo.onclick=()=>{snackbar.classList.remove('show');const fn=snackUndoFn;snackUndoFn=null;if(fn)fn();};

/* ---------------- preview ---------------- */
let previewPlainText='';
function openPreview(){previewPlainText=finalTextFrom(editor);previewBody.textContent=previewPlainText;previewScreen.classList.add('show');}
previewBtn.onclick=openPreview;previewBackBtn.onclick=()=>previewScreen.classList.remove('show');
$('#previewCopyBtn').onclick=()=>copyText(previewPlainText,'본문을 복사했습니다.');
$('#previewAiBtn').onclick=buildExportDialog;$('#previewExportBtn').onclick=openExportOptions;

/* ---------------- AI export in DOM order / ✦ section ---------------- */
function sectionOf(node){
  try{const r=document.createRange();r.setStart(editor,0);r.setEndBefore(node);const box=document.createElement('div');box.appendChild(r.cloneContents());return(finalTextFrom(box).match(/✦/g)||[]).length+1;}catch{return 1;}
}
function buildAiText(){
  const w=activeWork(),d=activeDoc();const nodes=$all(EXPORT_SELECTOR,editor).filter(n=>!n.classList.contains('pending-edit'));
  const lines=['================================',`《${w?.title||''}》`,d?.title||'','================================',''];
  if(!nodes.length){lines.push('등록된 교정 지시가 없습니다.');return lines.join('\n');}
  nodes.forEach((n,i)=>{
    lines.push(`[교정 ${String(i+1).padStart(3,'0')}]`,`위치: ${sectionOf(n)}구획`);
    if(n.classList.contains('modified')){
      const versions=getVersions(n);lines.push('작업: 수정','',`원문:\n${versions[0]||''}`,'',`수정문:\n${n.textContent}`);
      if(versions.length>2)lines.push('',`수정 이력:\n${versions.slice(1).map((v,j)=>`${j+1}차: ${v}`).join('\n')}`);
    }else if(n.classList.contains('added'))lines.push('작업: 추가','',`추가문:\n${n.textContent}`);
    else if(n.classList.contains('deleted'))lines.push('작업: 삭제','',`삭제 원문:\n${n.dataset.original||n.textContent}`);
    else lines.push('작업: 제안','',`원문:\n${n.dataset.original||n.textContent}`,'',`제안:\n${n.dataset.suggestion||''}`);
    lines.push('','--------------------------------','');
  });
  return lines.join('\n');
}
function buildExportDialog(){
  const text=buildAiText();modalBox.innerHTML=`<h3>AI 전달용 교정 지시서</h3><div class="export-body">${esc(text)}</div><div class="row"><button id="exCopy">복사</button><button class="primary" id="exClose">닫기</button></div>`;
  modalScrim.classList.add('show');$('#exCopy',modalBox).onclick=()=>copyText(text,'지시서를 복사했습니다.');$('#exClose',modalBox).onclick=closeModal;
}

/* ---------------- TXT / JSON import-export ---------------- */
function safeName(s){return String(s||'Story_Patcher').replace(/[\\/:*?"<>|]+/g,'_').trim()||'Story_Patcher';}
function timestamp(){const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;}
function downloadFile(content,name,type='text/plain;charset=utf-8'){
  const url=URL.createObjectURL(new Blob([content],{type}));const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function copyText(text,msg){
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>flashSnack(msg)).catch(()=>fallbackCopy(text,msg));else fallbackCopy(text,msg);
}
function fallbackCopy(text,msg){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();flashSnack(msg);}
function readFileText(file){return typeof file.text==='function'?file.text():new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(String(r.result||''));r.onerror=reject;r.readAsText(file);});}
function exportTxt(){const d=activeDoc();if(!d){flashSnack('열린 회차가 없습니다.');return;}downloadFile(finalTextFrom(editor),`${safeName(d.title)}.txt`);flashSnack('TXT 최종 원고를 내보냈습니다.');}
function exportJson(){saveProject(false);const data=JSON.parse(JSON.stringify(project));data.version=VERSION;data.exportedAt=new Date().toISOString();data.works.forEach(w=>{w.expanded=w._open!==false;w.docs.forEach(d=>{d.html=d.body||'';});});downloadFile(JSON.stringify(data,null,2),`Story_Patcher_프로젝트_${timestamp()}.json`,'application/json;charset=utf-8');flashSnack('프로젝트 JSON을 내보냈습니다.');}
function duplicateActiveDoc(){const w=activeWork(),d=activeDoc();if(w&&d)duplicateEpisode(w.id,d.id);}
async function importTxtFiles(files){
  if(!files.length)return;let w=activeWork();if(!w){w={id:uid('w'),title:'가져온 작품',docs:[],_open:true,lastActiveDocId:null};project.works.push(w);project.activeWorkId=w.id;}
  for(const f of files){const text=await readFileText(f);const title=f.name.replace(/\.[^.]+$/,'')||`회차 ${w.docs.length+1}`;const doc={id:uid('d'),title,body:textToHtml(text)};w.docs.push(doc);w.lastActiveDocId=doc.id;}
  const last=w.docs.at(-1);openDoc(w.id,last.id);flashSnack(`${files.length}개 TXT 원문을 불러왔습니다.`);
}
function textToHtml(text){return esc(String(text||'').replace(/\r\n?/g,'\n')).split(/\n{2,}/).map(b=>`<p>${b.replace(/\n/g,'<br>')}</p>`).join('');}
async function importJsonFile(file){
  try{const data=JSON.parse(await readFileText(file));if(!data||!Array.isArray(data.works))throw new Error('Story Patcher 프로젝트 형식이 아닙니다.');
    const apply=()=>{project=normalizeProject(data);loadActiveIntoEditor();saveProject();flashSnack('프로젝트 JSON을 불러왔습니다.');};
    if(project.works.length)showConfirmModal('프로젝트 불러오기','현재 프로젝트를 불러온 JSON으로 교체할까요? 먼저 필요한 작업을 백업해 주세요.','교체',apply,true);else apply();
  }catch(e){showConfirmModal('불러오기 실패',e.message||'JSON 파일을 읽지 못했습니다.','확인',()=>{});}
}
txtImportInput.onchange=async e=>{const files=[...(e.target.files||[])];e.target.value='';await importTxtFiles(files);};
jsonImportInput.onchange=async e=>{const file=e.target.files?.[0];e.target.value='';if(file)await importJsonFile(file);};
function openExportOptions(){
  modalBox.innerHTML='<h3>내보내기</h3><div class="row" style="flex-direction:column"><button id="opTxt">TXT 최종 원고</button><button id="opAi">AI 교정 지시서</button><button id="opJson">프로젝트 JSON 백업</button><button id="opClose">닫기</button></div>';
  modalScrim.classList.add('show');$('#opTxt').onclick=()=>{closeModal();exportTxt();};$('#opAi').onclick=()=>{closeModal();buildExportDialog();};$('#opJson').onclick=()=>{closeModal();exportJson();};$('#opClose').onclick=closeModal;
}

/* ---------------- top menu ---------------- */
menuBtn.addEventListener('click',e=>{e.stopPropagation();menuSheet.classList.toggle('show');});
document.addEventListener('click',e=>{if(!menuSheet.contains(e.target)&&e.target!==menuBtn)menuSheet.classList.remove('show');});
menuSheet.addEventListener('click',e=>{
  const m=e.target.closest('[data-m]');if(!m)return;menuSheet.classList.remove('show');const action=m.dataset.m;
  if(action==='exportAi')buildExportDialog();else if(action==='exportTxt')exportTxt();else if(action==='importTxt')txtImportInput.click();else if(action==='exportJson')exportJson();else if(action==='importJson')jsonImportInput.click();else if(action==='duplicateDoc')duplicateActiveDoc();
  else if(action==='renameDoc'){const w=activeWork(),d=activeDoc();if(w&&d)renameEpisode(w.id,d.id);}
  else if(action==='deleteDoc'){const w=activeWork(),d=activeDoc();if(w&&d)deleteEpisode(w.id,d.id);}
});

/* ---------------- editor input and empty-span guard ---------------- */
let ensureTimer=null;
editor.addEventListener('beforeinput',e=>{
  if(!inlineState)return;clearTimeout(ensureTimer);
  const deleting=e.inputType&&e.inputType.startsWith('delete');
  if(deleting&&inlineState.editable){
    const sel=getSelection(),value=editableValue(inlineState.editable);
    const inside=sel?.rangeCount&&inlineState.editable.contains(sel.anchorNode)&&inlineState.editable.contains(sel.focusNode);
    if(inside&&sel.isCollapsed&&!value){e.preventDefault();requestAnimationFrame(()=>focusEnd(inlineState.editable));}
  }
});
editor.addEventListener('input',()=>{
  updateCharCount();
  if(inlineState){clearTimeout(ensureTimer);ensureTimer=setTimeout(recreateEditableIfNeeded,0);}
  else scheduleSave();
});
editor.addEventListener('keydown',e=>{
  if(!inlineState)return;
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='a'){
    e.preventDefault();const r=document.createRange();r.selectNodeContents(inlineState.editable);const sel=getSelection();sel.removeAllRanges();sel.addRange(r);return;
  }
  if(e.key==='Escape'){e.preventDefault();cancelInline();}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();confirmInline();}
});
editor.addEventListener('blur',()=>{/* explicit confirm/cancel only */});

/* ---------------- boot ---------------- */
function boot(){repairProject(project);normalizeMobileLibraryOpenState();loadActiveIntoEditor();flashSaved();if(isTablet())libPanel.classList.add('show');renderReference();}
boot();

// Small test surface used only by automated checks; harmless in normal use.
window.__STORY_PATCHER_TEST__={finalText:()=>finalTextFrom(editor),aiText:buildAiText,getProject:()=>project,openPreview,annotationsInRange,duplicateWork,duplicateEpisode,openReference,closeReference,inline:()=>inlineState?{mode:inlineState.mode,editableText:inlineState.editable?.textContent,targetText:inlineState.target?.textContent,editableConnected:inlineState.editable?.isConnected,targetConnected:inlineState.target?.isConnected}:null,confirm:confirmInline,cancel:cancelInline};
})();
</script>
